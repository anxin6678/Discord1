<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Jirai Zego-Kei Masterpiece v4</title>
    <!-- 引入自适应 Tailwind CSS 核心解析引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入即构科技 ZEGOCLOUD 官方最新通用 WebExpress 音视频 IM 双工 SDK -->
    <script src="https://cdn.jsdelivr.net/npm/zego-express-engine-webrtc@3.0.0/ZegoExpressWebRTC.js"></script>
    <!-- 引入安全加解密组件 CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* 全尺寸原生 CSS 像素锁死，彻底剥离三方干扰，100% 免疫巨大化 Bug */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #111214; -webkit-tap-highlight-color: transparent; color: #dbdee1; font-size: 13px; overflow: hidden; height: 100vh; width: 100vw; }
        
        #app-root { display: flex; width: 100vw; height: 100vh; position: relative; }
        
        /* 渐进阶梯式 Discord 标准原厂调色盘 */
        .bg-discord-guilds { background-color: #1e1f22; }
        .bg-discord-sidebar { background-color: #2b2d31; }
        .bg-discord-main { background-color: #313338; }
        .bg-discord-input { background-color: #383a40; }
        .bg-discord-userpanel { background-color: #232428; }
        
        .text-jirai-pink { color: #ff85a2; }
        .border-jirai-pink { border-color: #ff85a2; }
        .bg-jirai-pink { background-color: #ff85a2; }
        .shadow-jirai-glow { box-shadow: 0 0 20px rgba(255, 133, 162, 0.3); }
        
        /* 侧边栏滑出抽屉移动端平滑过渡 */
        .sidebar-drawer { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Discord 经典物理阻尼圆角拟真悬停 */
        .server-icon { transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); border: 2px solid #1e1f22; }
        .server-icon:hover { border-radius: 16px !important; border-color: #ff85a2 !important; background-color: #ff85a2 !important; box-shadow: 0 0 15px #ff85a2; color: #000; }
        
        /* 消息整行原厂视觉高亮 */
        .chat-row { transition: background-color 0.15s ease; position: relative; }
        .chat-row:hover { background-color: rgba(255, 133, 162, 0.05); }
        .chat-row .msg-actions { opacity: 0; transition: opacity 0.1s ease; }
        .chat-row:hover .msg-actions { opacity: 1; }
        
        /* Discord 高仿真提及高亮 */
        .chat-row.mention-row { background-color: rgba(240, 178, 50, 0.08) !important; border-left: 3px solid #f0b232; }
        .chat-row.mention-row:hover { background-color: rgba(240, 178, 50, 0.12) !important; }
        .mention-badge { background-color: rgba(88, 101, 242, 0.3); color: #fff; padding: 0 4px; border-radius: 3px; font-weight: 500; }

        /* Discord 标准行内代码样式 */
        .discord-inline-code { background-color: #1e1f22; color: #e32626; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 12px; }

        /* 通话高亮 */
        .is-speaking { border-color: #ff85a2 !important; box-shadow: 0 0 18px #ff85a2 !important; }
        
        /* 定制美化滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f0f15; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff85a2; border-radius: 10px; }

        .voice-card { background-color: #1e1f22; border-radius: 8px; aspect-ratio: 16 / 9; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: all 0.2s; }
        .video-card-expanded { grid-column: 1 / -1 !important; grid-row: span 2 !important; aspect-ratio: 16 / 9 !important; z-index: 30; border-color: #ff85a2 !important; box-shadow: 0 0 25px rgba(255, 133, 162, 0.4); }
        
        /* 严密锁死桌面端视图间距 */
        .guilds-sidebar { width: 72px !important; min-width: 72px !important; }
        .channels-sidebar { width: 224px !important; min-width: 224px !important; }
        .member-list-sidebar { width: 240px !important; min-width: 240px !important; }

        /* 特效彩蛋掉落粒子 */
        .particle { position: fixed; pointer-events: none; opacity: 1; z-index: 60; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); opacity: 0; } }

        @media (max-width: 1023px) {
            .sidebar-drawer { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); z-index: 40; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
            .sidebar-drawer.drawer-open { transform: translateX(0); }
            .hamburger-btn { display: block; }
            .member-list-sidebar { display: none; }
        }
    </style>
</head>
<body class="select-none overflow-hidden font-sans antialiased text-xs sm:text-sm">

                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Zeus" class="edit-avatar-option w-11 h-11 rounded-full cursor-pointer border-2 border-transparent bg-discord-guilds transition" data-avatar="Zeus">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hades" class="edit-avatar-option w-11 h-11 rounded-full cursor-pointer border-2 border-transparent bg-discord-guilds transition" data-avatar="Hades">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Poseidon" class="edit-avatar-option w-11 h-11 rounded-full cursor-pointer border-2 border-transparent bg-discord-guilds transition" data-avatar="Poseidon">

            <div class="flex space-x-3">

        </div>
    </div>

    <!-- 3. Discord 原生骨架 -->
    <div id="app-root" class="flex h-screen w-screen bg-discord-main overflow-hidden relative">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-30" style="display: none;"></div>

                <div class="w-6 h-[1px] bg-neutral-800 rounded"></div>
                <button id="btn-change-bg" class="server-icon w-11 h-11 bg-discord-input rounded-[22px] flex items-center justify-center cursor-pointer text-base">🔮</button>
            </div>

            <!-- 中左：频道分类轴 -->
            <div class="channels-sidebar bg-discord-sidebar flex flex-col justify-between flex-shrink-0 border-r border-black/5">

                    <div class="p-2 space-y-4">

                            <div id="text-channels-list" class="space-y-0.5">
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-jirai-pink bg-jirai-pink/10 border border-jirai-pink/10 cursor-pointer text-xs font-medium transition active" data-type="text" data-channel="chat-lobby">

                                </div>
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-neutral-700/30 hover:text-gray-200 cursor-pointer text-xs transition" data-type="text" data-channel="announcements">

                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="text-[10px] font-bold text-neutral-400 px-2 mb-1.5 uppercase tracking-wider">多媒体语音大厅</div>
                            <div id="voice-channels-list" class="space-y-0.5">
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-neutral-700/30 hover:text-gray-200 cursor-pointer text-xs transition" data-type="voice" data-channel="global-server-room">

                                </div>
                            </div>
                        </div>

                </div>
                <!-- 用户卡片底座 -->
                <div class="h-14 bg-discord-userpanel flex items-center justify-between px-2 flex-shrink-0 border-t border-black/10">

        <!-- 右侧主看板区域 -->

                        <div class="flex space-x-0.5 items-center pt-0.5"><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span></div>

                    <div class="px-4 pb-6 pt-1 flex-shrink-0">

    <input type="file" id="image-loader" accept="image/*" class="hidden">

    <script>
        const ZEGO_ROOM_ID = "global-server-room"; 
        const ZEGO_APP_ID = 1408717387; 
        const ZEGO_SERVER_SECRET = "0552daaa40a25d28c8c5fe74dc4af61e";
        const ZEGO_SERVER_URL = "wss://webliveroom" + ZEGO_APP_ID + "-api.zegocloud.com/ws";

        let zgEngine = null;
        let isEngineReady = false;
        let localStreamInstance = null;
        let isHardwareLock = false; 
        
        let myInfo = { uid: "", name: "", avatar: "Ares", activeRoomId: "", statusText: "🎀 处于混沌极点" };
        let roomUsersPresence = {}; 
        let onlineRoomUsers = {}; 
        let activeTextChannel = "chat-lobby";
        let isMuted = false, isCameraOn = false, isScreenSharing = false, isBoardOpen = false;
        let currentCameraFacing = "user"; 
        let typingTimeout = null;

        // 白板画笔状态机
        let currentBrushColor = "#ff85a2";
        let currentBrushSize = 3;

        const canvas = document.getElementById('whiteboard-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        const backgrounds = [
            "linear-gradient(135deg, #111214 0%, #1e1f22 100%)",
            "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"
        ];
        let currentBgIdx = 0;

        // 导航控制
        const btnSidebar = document.getElementById('btn-trigger-sidebar');
        const sidebarWrapper = document.getElementById('sidebar-wrapper');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebarDrawer(show) {

        async function initZegoEngine() {
            try {
                if (typeof ZegoExpressEngine === "undefined") return;
                zgEngine = new ZegoExpressEngine(ZEGO_APP_ID, ZEGO_SERVER_URL);
                isEngineReady = true;

                zgEngine.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                    if (updateType === 'ADD') {
                        for (let stream of streamList) {
                            try {
                                const remoteStream = await zgEngine.startPlayingStream(stream.streamID);
                                let userMeta = {};
                                try { if(stream.extraInfo) userMeta = JSON.parse(stream.extraInfo); } catch(ex){}
                                
                                onlineRoomUsers[stream.user.userID] = {
                                    name: userMeta.name || stream.user.userName,
                                    avatar: userMeta.avatar || "Ares",
                                    streamID: stream.streamID,
                                    isMuted: userMeta.isMuted || false,
                                    isCameraOn: userMeta.isCameraOn || false,
                                    isScreenSharing: userMeta.isScreenSharing || false
                                };
                                updateVoiceUIRender(); refreshOnlineMemberList();
                                
                                const mediaPool = document.getElementById('global-media-pool');
                                if (mediaPool && remoteStream) {
                                    const poolVideo = document.getElementById(`pool-video-${stream.streamID}`) || document.createElement('video');
                                    poolVideo.id = `pool-video-${stream.streamID}`;
                                    poolVideo.srcObject = remoteStream;
                                    poolVideo.autoplay = true;
                                    poolVideo.playsInline = true;
                                    mediaPool.appendChild(poolVideo);
                                }

                                setTimeout(() => {
                                    const slot = document.getElementById(`video-slot-${stream.user.userID}`);
                                    if(slot && remoteStream) { 
                                        slot.innerHTML = ""; 
                                        const videoElement = document.createElement('video');
                                        videoElement.srcObject = remoteStream;
                                        videoElement.autoplay = true;
                                        videoElement.playsInline = true;
                                        videoElement.muted = true; 
                                        videoElement.style.width = "100%";
                                        videoElement.style.height = "100%";
                                        videoElement.style.objectFit = "cover";
                                        slot.appendChild(videoElement);
                                    }
                                }, 500);
                            } catch(errStream){}
                        }
                    } else if (updateType === 'DELETE') {
                        for (let stream of streamList) {
                            zgEngine.stopPlayingStream(stream.streamID);
                            const poolVideo = document.getElementById(`pool-video-${stream.streamID}`);
                            if (poolVideo) poolVideo.remove();
                            delete onlineRoomUsers[stream.user.userID];
                            updateVoiceUIRender(); refreshOnlineMemberList();
                        }
                    }
                });

                zgEngine.on('IMRecvBroadcastMessage', (roomID, chatData) => {
                    chatData.forEach(msg => {
                        try {
                            const data = JSON.parse(msg.message);
                            
                            if (data.type === "IDENTITY_SYNC") {
                                onlineRoomUsers[msg.fromUser.userID] = {
                                    name: data.name,
                                    avatar: data.avatar,
                                    statusText: data.statusText,
                                    isMuted: data.isMuted,
                                    isCameraOn: data.isCameraOn,
                                    isScreenSharing: data.isScreenSharing
                                };
                                refreshOnlineMemberList();
                                updateVoiceUIRender();
                                return;
                            }

                            // 🚨 核心流隔离修复：白板轨迹数据移入专属定制字段，绝不干扰普通聊天
                            if(data.type === "DRAW_PATH") {
                                drawLocalLine(data.x1 * canvas.width, data.y1 * canvas.height, data.x2 * canvas.width, data.y2 * canvas.height, false, data.color, data.size);
                                return;
                            }
                            if(data.type === "CLEAR_BOARD") {
                                ctx.clearRect(0, 0, canvas.width, canvas.height);
                                return;
                            }

                            if (data.type === "TEXT" && data.content.includes("@everyone") && data.channelId === activeTextChannel) {
                                triggerSystemFlashNotification();
                            }

                            if(data.channelId === activeTextChannel && msg.fromUser.userID !== myInfo.uid) { 
                                renderMessage(data); 
                            }
                        } catch(e){}
                    });
                });

                zgEngine.on('IMRecvCustomCommand', (roomID, fromUser, command) => {
                    try {
                        const data = JSON.parse(command);
                        if(data.type === "TYPING" && data.channelId === activeTextChannel && fromUser.userID !== myInfo.uid) showTypingIndicator(data.senderName);
                        if(data.type === "REACTION" && data.channelId === activeTextChannel) executeLocalReactionAppend(data.targetMsgId, data.emoji);
                        if(data.type === "PIN_MSG" && data.channelId === activeTextChannel) { document.getElementById('pinned-text').innerText = data.content; document.getElementById('pinned-banner').style.display = 'block'; }
                        if(data.type === "DELETE_MSG" && data.channelId === activeTextChannel) { const el = document.getElementById(data.targetMsgId); if(el) el.remove(); }
                    } catch(e){}
                });

                zgEngine.on('roomUserUpdate', (roomID, updateType, userList) => {
                    if (updateType === 'ADD') {
                        userList.forEach(u => { roomUsersPresence[u.userID] = u.userName; });
                    } else if (updateType === 'DELETE') {
                        userList.forEach(u => { delete roomUsersPresence[u.userID]; delete onlineRoomUsers[u.userID]; });
                    }
                    broadcastUserInfo(); 
                    refreshOnlineMemberList();
                });
            } catch (err) { console.error(err); }
        }

        // 🚨 核心还原：Discord 原生自适应 Markdown 宏解析编译器，支持多形态标记无缝降临
        function compileDiscordMarkdown(text) {
            let html = escapeHTML(text);
            // 粗体
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // 斜体
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // 下划线
            html = html.replace(/__(.*?)__/g, '<u>$1</u>');
            // 删除线
            html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
            // 行内灰色代码块
            html = html.replace(/`(.*?)`/g, '<span class="discord-inline-code">$1</span>');
            return html;
        }

        function renderMessage(msg) {

            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const row = document.createElement('div');
            row.id = msg.msgId || ("local_" + Date.now());
            
            const isMention = msg.content && msg.content.includes("@everyone");
            row.className = isMention ? "chat-row mention-row" : "chat-row";
            
            let compiledContent = isMention 
                ? compileDiscordMarkdown(msg.content).replace(/@everyone/g, '<span class="mention-badge">@everyone</span>')
                : compileDiscordMarkdown(msg.content);

            let contentHTML = isImage 
                ? `<img src="${msg.content}" class="msg-img" onclick="window.open('${msg.content}')">`
                : `<p class="text-neutral-200 select-text leading-relaxed break-all">${compiledContent}</p>`;

            row.innerHTML = `
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${msg.senderAvatar}" class="w-8 h-8 rounded-full bg-discord-guilds flex-shrink-0 mt-0.5 border border-neutral-800">
                <div class="flex-1 min-w-0">
                    <div class="flex items-baseline space-x-2"><span class="font-semibold text-white hover:underline cursor-pointer">${escapeHTML(msg.senderName)}</span><span class="text-[9px] text-neutral-500">${timeStr}</span></div>
                    ${contentHTML}
                    <div class="reaction-box"></div>
                </div>
                <div class="msg-actions">
                    <button class="action-icon-btn" onclick="sendReaction('${row.id}', '🖤')">🖤</button>
                    <button class="action-icon-btn" onclick="sendReaction('${row.id}', '🎀')">🎀</button>
                    <button class="action-icon-btn" onclick="pinThisMessage('${row.id}')">📌</button>
                    ${msg.senderUid === myInfo.uid ? `<button class="action-icon-btn" style="color: #da373c;" onclick="deleteMyMessage('${row.id}')">🗑️</button>` : ''}
                </div>
            `;
            container.appendChild(row); container.scrollTop = container.scrollHeight;
        }

        // 🚨 交互控制调节
        function toggleWhiteboardLayer() {
            const area = document.getElementById('whiteboard-area');
            const palette = document.getElementById('board-palette');
            isBoardOpen = !isBoardOpen;
            if(isBoardOpen) {
                area.style.display = 'flex';
                if(palette) palette.style.display = 'flex';
                document.getElementById('btn-toggle-board').style.backgroundColor = '#ff85a2';
                document.getElementById('btn-toggle-board').style.color = '#000';
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight - 40;
                setupCanvasStyle();
            } else {
                area.style.display = 'none';
                if(palette) palette.style.display = 'none';
                document.getElementById('btn-toggle-board').style.backgroundColor = '#383a40';
                document.getElementById('btn-toggle-board').style.color = '#fff';
            }
        }
        document.getElementById('btn-toggle-board').addEventListener('click', toggleWhiteboardLayer);

        function changeBrushColor(color) { currentBrushColor = color; setupCanvasStyle(); }
        function changeBrushSize(size) { currentBrushSize = parseInt(size); setupCanvasStyle(); }
        function setupCanvasStyle() { ctx.strokeStyle = currentBrushColor; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = currentBrushSize; }

        // 🚨 白板信令广播偏轴动态清洗修对
        function drawLocalLine(x1, y1, x2, y2, emitBroadcast = true, color = currentBrushColor, size = currentBrushSize) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.restore();

            if(emitBroadcast && isEngineReady) {
                zgEngine.sendBroadcastMessage(ZEGO_ROOM_ID, JSON.stringify({ type: "DRAW_PATH", x1: x1 / canvas.width, y1: y1 / canvas.height, x2: x2 / canvas.width, y2: y2 / canvas.height, color, size })).catch(()=>{});
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; [lastX, lastY] = [e.offsetX, e.offsetY]; });
        canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; drawLocalLine(lastX, lastY, e.offsetX, e.offsetY, true); [lastX, lastY] = [e.offsetX, e.offsetY]; });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true; const rect = canvas.getBoundingClientRect();
            // 引入依靠滑控精细防偏移
            lastX = Math.round((e.touches[0].clientX - rect.left) * (canvas.width / rect.width));
            lastY = Math.round((e.touches[0].clientY - rect.top) * (canvas.height / rect.height));
        }, { passive: true });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return; const rect = canvas.getBoundingClientRect();
            const currentX = Math.round((e.touches[0].clientX - rect.left) * (canvas.width / rect.width));
            const currentY = Math.round((e.touches[0].clientY - rect.top) * (canvas.height / rect.height));
            drawLocalLine(lastX, lastY, currentX, currentY, true); [lastX, lastY] = [currentX, currentY];
        }, { passive: true });

        function initCanvasResize() { window.addEventListener('resize', () => { if(isBoardOpen) { const temp = ctx.getImageData(0,0,canvas.width,canvas.height); canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight - 40; setupCanvasStyle(); ctx.putImageData(temp,0,0); } }); }

        async function refreshOnlineMemberList() {
            if(!isEngineReady) return;
            try {
                const listContainer = document.getElementById('member-list'); if(!listContainer) return;
                listContainer.innerHTML = ""; let count = 0;
                let myStateBadge = isScreenSharing ? "🖥️ LIVE 共享" : (isCameraOn ? "📷 CAM 视讯" : "🎀 降临中");
                appendMemberItem(myInfo.name, myInfo.avatar, myStateBadge, true); count++;
                for (let uid in roomUsersPresence) {
                    if (uid === myInfo.uid) continue;
                    const cached = onlineRoomUsers[uid];
                    const name = cached && cached.name ? cached.name : roomUsersPresence[uid];
                    const avatar = cached && cached.avatar ? cached.avatar : "Ares";
                    let remoteBadge = "🎀 已在线";
                    if (cached) {
                        if (cached.isScreenSharing) remoteBadge = "🖥️ LIVE 共享";
                        else if (cached.isCameraOn) remoteBadge = "📷 CAM 通话";
                    }
                    appendMemberItem(name, avatar, remoteBadge, false); count++;
                }
                document.getElementById('member-count').innerText = count;
            } catch(e){}
        }

        function broadcastUserInfo() {
            if(isEngineReady && !isHardwareLock) { 
                const payload = { type: "IDENTITY_SYNC", name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted, isCameraOn: isCameraOn, isScreenSharing: isScreenSharing, statusText: myInfo.statusText };
                zgEngine.sendBroadcastMessage(ZEGO_ROOM_ID, JSON.stringify(payload)).catch(()=>{});
            }
        }

        document.getElementById('btn-trigger-image').addEventListener('click', () => document.getElementById('image-loader').click());
        document.getElementById('image-loader').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file || file.size > 150 * 1024) return alert("请发送 150KB 内的小图资产。");
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const payload = { type: "IMAGE", msgId: "msg_"+Date.now(), channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content: evt.target.result, timestamp: Date.now() };
                renderMessage(payload);
                if(isEngineReady) await zgEngine.sendBroadcastMessage(ZEGO_ROOM_ID, JSON.stringify(payload));
            };
            reader.readAsDataURL(file); this.value = "";
        });

        setInterval(() => { if(myInfo.name && isEngineReady) { broadcastUserInfo(); } refreshOnlineMemberList(); }, 4000);
        function escapeHTML(str) { if (!str) return ''; return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
