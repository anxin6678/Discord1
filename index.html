<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Jirai Zego-Kei Masterpiece</title>
    <!-- 引入稳定高效的全自适应 Tailwind CSS 核心解析引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入即构科技 ZEGOCLOUD 官方最新通用 WebExpress 音视频 IM 双工 SDK -->
    <script src="https://cdn.jsdelivr.net/npm/zego-express-engine-webrtc@3.0.0/ZegoExpressWebRTC.js"></script>
    <!-- 引入前端动态高安全对称加解密核心组件 CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* 物理尺寸严格硬编码锁死，绝不允许任何第三方残留脚本恶意撑大 */
        body { background-color: #0d0d12; -webkit-tap-highlight-color: transparent; color: #dbdee1; font-size: 13px; }
        .bg-jirai-blacker { background-color: #06060a; }
        .bg-jirai-dark { background-color: #0f0f15; }
        .bg-jirai-main { background-color: #14141f; }
        .bg-jirai-input { background-color: #1e1e2c; }
        
        .text-jirai-pink { color: #ff85a2; }
        .border-jirai-pink { border-color: #ff85a2; }
        .bg-jirai-pink { background-color: #ff85a2; }
        .shadow-jirai-glow { box-shadow: 0 0 20px rgba(255, 133, 162, 0.3); }
        
        /* 侧边栏滑出抽屉无缝过渡 */
        .sidebar-drawer { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Discord 经典阻尼呼吸圆角图标 */
        .server-icon { transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid #1e1e2c; }
        .server-icon:hover { border-radius: 14px !important; border-color: #ff85a2 !important; background-color: #ff85a2 !important; box-shadow: 0 0 15px #ff85a2; color: #000; }
        
        /* 消息整行高保真高亮变色 */
        .chat-row { transition: background-color 0.15s ease; position: relative; }
        .chat-row:hover { background-color: rgba(255, 133, 162, 0.04); }
        .chat-row .msg-actions { opacity: 0; transition: opacity 0.1s ease; }
        .chat-row:hover .msg-actions { opacity: 1; }
        
        /* Discord 高仿真提及高亮：琥珀金色底与黄色警示条 */
        .chat-row.mention-row { background-color: rgba(240, 178, 50, 0.08) !important; border-left: 3px solid #f0b232; }
        .chat-row.mention-row:hover { background-color: rgba(240, 178, 50, 0.12) !important; }
        .mention-badge { background-color: rgba(88, 101, 242, 0.3); color: #fff; padding: 0 4px; border-radius: 3px; font-weight: 500; }

        /* 通话高亮：说话时头像闪烁地雷粉红霓虹光环 */
        .is-speaking { border-color: #ff85a2 !important; box-shadow: 0 0 18px #ff85a2 !important; }
        
        /* 微型可爱蕾丝定制滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f0f15; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff85a2; border-radius: 10px; }

        .video-card-expanded { grid-column: 1 / -1 !important; grid-row: span 2 !important; aspect-ratio: 16 / 9 !important; z-index: 30; border-color: #ff85a2 !important; box-shadow: 0 0 25px rgba(255, 133, 162, 0.4); }
        .video-view-container video { object-fit: cover !important; border-radius: 12px; width: 100%; height: 100%; }
        #whiteboard-canvas { cursor: crosshair; touch-action: none; background-color: #0b0b0f; }
        
        .guilds-sidebar { width: 64px !important; min-width: 64px !important; }
        .channels-sidebar { width: 224px !important; min-width: 224px !important; }
        .member-list-sidebar { width: 224px !important; min-width: 224px !important; }

        /* 彩蛋特效掉落粒子容器 */
        .particle { position: fixed; pointer-events: none; opacity: 1; z-index: 60; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); opacity: 0; } }

        @media (max-width: 1023px) {
            .sidebar-drawer { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); z-index: 40; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
            .sidebar-drawer.drawer-open { transform: translateX(0); }
            .hamburger-btn { display: block; }
            .member-list-sidebar { display: none; }
            #sidebar-overlay.overlay-open { display: block; }
            .multimedia-split-zone { flex-direction: column !important; }
            .whiteboard-box-wrapper { width: 100% !important; height: 260px !important; }
        }
        @media (min-width: 768px) { .multimedia-split-zone { flex-direction: row; } .whiteboard-box-wrapper { width: 50%; height: 100%; } }
    </style>
</head>
<body class="select-none overflow-hidden font-sans antialiased text-xs sm:text-sm">

    <!-- 1. 契约建立弹窗 -->

                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Zeus" class="edit-avatar-option w-11 h-11 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition" data-avatar="Zeus">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hades" class="edit-avatar-option w-11 h-11 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition" data-avatar="Hades">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Poseidon" class="edit-avatar-option w-11 h-11 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition" data-avatar="Poseidon">

    <!-- 2. 主页面框架 -->
    <div id="app-root" class="flex h-screen w-screen bg-jirai-main overflow-hidden relative">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden transition-opacity"></div>

        <!-- 组合树导航轴 -->
        <div id="sidebar-wrapper" class="sidebar-drawer fixed lg:static inset-y-0 left-0 flex z-40 transform -translate-x-full lg:translate-x-0 flex-shrink-0">
            <div class="guilds-sidebar bg-jirai-blacker flex flex-col items-center py-3 space-y-3 flex-shrink-0 border-r border-jirai-pink/5">

                <div class="w-6 h-[1px] bg-neutral-900 rounded"></div>
                <button id="btn-change-bg" class="server-icon w-11 h-11 bg-jirai-input rounded-[22px] flex items-center justify-center cursor-pointer text-base">🔮</button>
            </div>

            <div class="channels-sidebar bg-jirai-dark flex flex-col justify-between flex-shrink-0 border-r border-jirai-pink/5">
                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <div class="h-12 border-b border-jirai-blacker flex items-center px-4 font-bold text-jirai-pink tracking-wider">真言结界联邦 🩰</div>
                    <div class="p-2 space-y-4">

                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-jirai-pink bg-jirai-pink/10 border border-jirai-pink/10 cursor-pointer text-xs font-medium transition" data-type="text" data-channel="chat-lobby">

                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-jirai-main/30 hover:text-gray-200 cursor-pointer text-xs transition" data-type="text" data-channel="announcements">

        <!-- 右侧视窗 -->

                <div class="flex items-center space-x-3">
                    <button id="btn-trigger-sidebar" class="block lg:hidden text-jirai-pink text-xl hover:text-white transition p-1.5 bg-jirai-input rounded-xl border border-jirai-pink/10">☰</button>

                    <span id="voice-status-pill" class="voice-active-tag" style="display: none;">ZEGO ACTIVE</span>

            </div>
            
            <div class="workspace-split flex-1 flex overflow-hidden">
                <!-- 文本面板 -->
                <div id="panel-chat" class="chat-panel">
                    <div id="chat-messages" class="messages-container custom-scrollbar"></div>

                        <div class="flex space-x-0.5 items-center pt-0.5"><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span></div>
                    </div>
                    <div class="px-4 pb-6 pt-1 flex-shrink-0">
                        <div class="bg-jirai-input rounded-xl px-4 py-2.5 flex items-center space-x-3 shadow-md border border-jirai-pink/5 focus-within:border-jirai-pink/20 transition-all duration-300">
                            <button id="btn-trigger-image" class="text-neutral-400 hover:text-jirai-pink transition text-base">➕</button>
                            <input type="text" id="chat-input" placeholder="输入消息后按回车发送（试试输入 /jirai 有惊喜哦）..." class="flex-1 bg-transparent text-xs sm:text-sm focus:outline-none text-neutral-100 placeholder-neutral-600" autocomplete="off">

                        <div id="whiteboard-area" class="whiteboard-box-wrapper" style="display: none;">
                            <div class="board-top-menu">
                                <span class="text-jirai-pink font-bold">🎨 跨端同步画壁 (Whiteboard)</span>

    <input type="file" id="image-loader" accept="image/*" class="hidden">

    <script>
        const ZEGO_ROOM_ID = "global-server-room"; 
        const ZEGO_APP_ID = 1408717387; 
        const ZEGO_SERVER_SECRET = "0552daaa40a25d28c8c5fe74dc4af61e";
        const ZEGO_SERVER_URL = "wss://webliveroom" + ZEGO_APP_ID + "-api.zegocloud.com/ws";

        let zgEngine = null;
        let isEngineReady = false;
        let localStreamInstance = null;
        
        let myInfo = { uid: "", name: "", avatar: "Ares", activeRoomId: "", statusText: "🎀 处于混沌极点" };
        let roomUsersPresence = {}; 
        let onlineRoomUsers = {}; 
        let activeTextChannel = "chat-lobby";
        let isMuted = false, isCameraOn = false, isScreenSharing = false, isBoardOpen = false;
        let currentCameraFacing = "user"; 
        let typingTimeout = null;

        const canvas = document.getElementById('whiteboard-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        const backgrounds = [
            "linear-gradient(135deg, #07070a 0%, #101018 100%)",
            "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"
        ];
        let currentBgIdx = 0;

        // 抽屉导航控制
        const btnSidebar = document.getElementById('btn-trigger-sidebar');
        const sidebarWrapper = document.getElementById('sidebar-wrapper');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebarDrawer(show) {
            if (show) { sidebarWrapper.classList.add('drawer-open'); sidebarOverlay.classList.add('overlay-open'); }
            else { sidebarWrapper.classList.remove('drawer-open'); sidebarOverlay.classList.remove('overlay-open'); }
        }
        if(btnSidebar) btnSidebar.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebarDrawer(true); });
        sidebarOverlay.addEventListener('click', () => toggleSidebarDrawer(false));

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            if (touchEndX - touchStartX > 70 && touchStartX < window.innerWidth / 3) toggleSidebarDrawer(true);
            if (touchStartX - touchEndX > 70) toggleSidebarDrawer(false);
        }, {passive: true});

        // 首次进站头像
        let selectedSeed = "Ares";
        document.querySelectorAll('.init-avatar-selector .avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.init-avatar-selector .avatar-option').forEach(img => img.style.borderColor = 'transparent');
                e.target.style.borderColor = '#ff85a2';
                selectedSeed = e.target.dataset.avatar;
            });
        });

        // 二阶段修改属性更改控制
        let tempSelectedEditSeed = "Ares";
        document.querySelectorAll('.dynamic-avatar-selector .edit-avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.dynamic-avatar-selector .edit-avatar-option').forEach(img => img.style.borderColor = 'transparent');
                e.target.style.borderColor = '#ff85a2';
                tempSelectedEditSeed = e.target.dataset.avatar;
            });
        });

        document.getElementById('user-profile-trigger').addEventListener('click', () => {
            document.getElementById('edit-username-input').value = myInfo.name;
            tempSelectedEditSeed = myInfo.avatar;
            document.querySelectorAll('.dynamic-avatar-selector .edit-avatar-option').forEach(img => {
                img.style.borderColor = (img.dataset.avatar === myInfo.avatar) ? '#ff85a2' : 'transparent';
            });
            document.getElementById('profile-edit-overlay').classList.remove('hidden');
        });

        document.getElementById('btn-cancel-profile').addEventListener('click', () => {
            document.getElementById('profile-edit-overlay').classList.add('hidden');
        });

        document.getElementById('btn-save-profile').addEventListener('click', async () => {
            const newName = document.getElementById('edit-username-input').value.trim();
            if(!newName) return alert("契约昵称不可留白哦🎀");
            
            myInfo.name = newName;
            myInfo.avatar = tempSelectedEditSeed;
            
            document.getElementById('my-name').innerText = newName;
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${tempSelectedEditSeed}`;

        function generateZegoRoomToken(roomID, userID) {
            try {
                if (typeof CryptoJS === "undefined") return btoa(JSON.stringify({ appid: ZEGO_APP_ID, roomid: roomID, userid: userID }));
                const expiredTime = Math.floor(Date.now() / 1000) + 7200; 
                const nonce = Math.floor(Math.random() * 2147483647);
                const tokenObj = { appid: ZEGO_APP_ID, roomid: roomID, userid: userID, privilege: { 1: 1, 2: 1 }, nonce: nonce, expired: expiredTime };
                const tokenStr = JSON.stringify(tokenObj);
                const hash = CryptoJS.HmacSHA256(tokenStr, ZEGO_SERVER_SECRET);
                const signature = hash.toString(CryptoJS.enc.Hex);
                const finalPayload = { token: btoa(tokenStr), signature: signature };
                return btoa(JSON.stringify(finalPayload));
            } catch(e) { return btoa(JSON.stringify({ roomid: roomID, userid: userID })); }
        }

        async function initZegoEngine() {
            try {
                if (typeof ZegoExpressEngine === "undefined") return;
                zgEngine = new ZegoExpressEngine(ZEGO_APP_ID, ZEGO_SERVER_URL);
                isEngineReady = true;

                zgEngine.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                    if (updateType === 'ADD') {
                        for (let stream of streamList) {
                            try {
                                const remoteStream = await zgEngine.startPlayingStream(stream.streamID);
                                let userMeta = {};
                                try { if(stream.extraInfo) userMeta = JSON.parse(stream.extraInfo); } catch(ex){}
                                
                                onlineRoomUsers[stream.user.userID] = {
                                    name: userMeta.name || stream.user.userName,
                                    avatar: userMeta.avatar || "Ares",
                                    streamID: stream.streamID,
                                    isMuted: userMeta.isMuted || false,
                                    isCameraOn: userMeta.isCameraOn || false,
                                    isScreenSharing: userMeta.isScreenSharing || false
                                };
                                updateVoiceUIRender(); refreshOnlineMemberList();
                                
                                setTimeout(() => {
                                    const slot = document.getElementById(`video-slot-${stream.user.userID}`);
                                    if(slot && remoteStream) { slot.innerHTML = ""; zgEngine.createRemoteStreamView(remoteStream).play(slot); }
                                }, 500);
                            } catch(errStream){}
                        }
                    } else if (updateType === 'DELETE') {
                        for (let stream of streamList) {
                            zgEngine.stopPlayingStream(stream.streamID);
                            delete onlineRoomUsers[stream.user.userID];
                            updateVoiceUIRender(); refreshOnlineMemberList();
                        }
                    }
                });

                zgEngine.on('IMRecvBroadcastMessage', (roomID, chatData) => {
                    chatData.forEach(msg => {
                        try {
                            const data = JSON.parse(msg.message);
                            
                            if (data.type === "IDENTITY_SYNC") {
                                onlineRoomUsers[msg.fromUser.userID] = {
                                    name: data.name,
                                    avatar: data.avatar,
                                    statusText: data.statusText,
                                    isCameraOn: data.isCameraOn,
                                    isScreenSharing: data.isScreenSharing
                                };
                                refreshOnlineMemberList();
                                updateVoiceUIRender();
                                return;
                            }

                            // 🚨 跨端新奇功能功能：接受他人触发的全服震动闪烁强通知
                            if (data.type === "TEXT" && data.content.includes("@everyone") && data.channelId === activeTextChannel) {
                                triggerSystemFlashNotification();
                            }

                            // 🚨 核心流隔离修复：只有当接收包内的信道ID对齐当前激活窗口时，才刷新至流水线，100%防止消息串流
                            if(data.channelId === activeTextChannel && msg.fromUser.userID !== myInfo.uid) { 
                                renderMessage(data); 
                            }
                        } catch(e){}
                    });
                });

                zgEngine.on('IMRecvCustomCommand', (roomID, fromUser, command) => {
                    try {
                        const data = JSON.parse(command);
                        if(data.type === "TYPING" && data.channelId === activeTextChannel && fromUser.userID !== myInfo.uid) showTypingIndicator(data.senderName);
                        if(data.type === "REACTION" && data.channelId === activeTextChannel) executeLocalReactionAppend(data.targetMsgId, data.emoji);
                        if(data.type === "PIN_MSG" && data.channelId === activeTextChannel) { document.getElementById('pinned-text').innerText = data.content; document.getElementById('pinned-banner').style.display = 'block'; }
                        if(data.type === "DELETE_MSG" && data.channelId === activeTextChannel) { const el = document.getElementById(data.targetMsgId); if(el) el.remove(); }
                        if(data.type === "DRAW_PATH" && isBoardOpen) drawLocalLine(data.x1 * canvas.width, data.y1 * canvas.height, data.x2 * canvas.width, data.y2 * canvas.height, false);
                        if(data.type === "CLEAR_BOARD") ctx.clearRect(0, 0, canvas.width, canvas.height);
                    } catch(e){}
                });

                zgEngine.on('roomUserUpdate', (roomID, updateType, userList) => {
                    if (updateType === 'ADD') {
                        userList.forEach(u => { roomUsersPresence[u.userID] = u.userName; });
                    } else if (updateType === 'DELETE') {
                        userList.forEach(u => { delete roomUsersPresence[u.userID]; delete onlineRoomUsers[u.userID]; });
                    }
                    broadcastUserInfo(); 
                    refreshOnlineMemberList();
                });
            } catch (err) { console.error(err); }

        function setupCanvasStyle() { ctx.strokeStyle = '#ff85a2'; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = 3; }

        function drawLocalLine(x1, y1, x2, y2, emitBroadcast = true) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            if(emitBroadcast && isEngineReady) {
                zgEngine.sendCustomCommand(ZEGO_ROOM_ID, JSON.stringify({ type: "DRAW_PATH", channelId: activeTextChannel, x1: x1 / canvas.width, y1: y1 / canvas.height, x2: x2 / canvas.width, y2: y2 / canvas.height })).catch(()=>{});
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; [lastX, lastY] = [e.offsetX, e.offsetY]; });
        canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; drawLocalLine(lastX, lastY, e.offsetX, e.offsetY, true); [lastX, lastY] = [e.offsetX, e.offsetY]; });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true; const rect = canvas.getBoundingClientRect();
            lastX = Math.round(e.touches[0].clientX - rect.left); lastY = Math.round(e.touches[0].clientY - rect.top);
        }, { passive: true });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return; const rect = canvas.getBoundingClientRect();
            const currentX = Math.round(e.touches[0].clientX - rect.left); const currentY = Math.round(e.touches[0].clientY - rect.top);
            drawLocalLine(lastX, lastY, currentX, currentY, true); [lastX, lastY] = [currentX, currentY];
        }, { passive: true });

        document.getElementById('btn-clear-board').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(isEngineReady) zgEngine.sendCustomCommand(ZEGO_ROOM_ID, JSON.stringify({ type: "CLEAR_BOARD", channelId: activeTextChannel })).catch(()=>{});
        });

        function initCanvasResize() {
            window.addEventListener('resize', () => {
                if(isBoardOpen) {
                    const temp = ctx.getImageData(0,0,canvas.width,canvas.height);
                    canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight - 40;
                    setupCanvasStyle(); ctx.putImageData(temp,0,0);
                }
            });
        }

        async function refreshOnlineMemberList() {
            if(!isEngineReady) return;
            try {
                const listContainer = document.getElementById('member-list'); if(!listContainer) return;

                let myStateBadge = isScreenSharing ? "🖥️ LIVE 共享" : (isCameraOn ? "📷 CAM 视讯" : "🎀 降临中");
                appendMemberItem(myInfo.name, myInfo.avatar, myStateBadge, true); count++;
                
                for (let uid in roomUsersPresence) {
                    if (uid === myInfo.uid) continue;
                    const cached = onlineRoomUsers[uid];
                    const name = cached && cached.name ? cached.name : roomUsersPresence[uid];
                    const avatar = cached && cached.avatar ? cached.avatar : "Ares";
                    
                    let remoteBadge = "🎀 已在线";
                    if (cached) {
                        if (cached.isScreenSharing) remoteBadge = "🖥️ LIVE 共享";
                        else if (cached.isCameraOn) remoteBadge = "📷 CAM 通话";
                    }
                    
                    appendMemberItem(name, avatar, remoteBadge, false); count++;
                }
                document.getElementById('member-count').innerText = count;
            } catch(e){}
        }

            listContainer.appendChild(item);
        }

        document.querySelectorAll('.channel-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const currentBtn = e.currentTarget; const type = currentBtn.dataset.type; const target = currentBtn.dataset.channel;
                document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                currentBtn.classList.add('active');
                if (type === 'text') switchTextChannel(target); else if (type === 'voice') switchVoiceChannel(target);
            });
        });

        function updateVoiceUIRender() {
            const container = document.getElementById('voice-grid'); if(!container) return;
            if(document.getElementById('panel-voice').style.display === 'none') return;
            container.innerHTML = "";

            appendVoiceCard(myInfo.uid, myInfo.name, myInfo.avatar, isMuted, true);
            if(localStreamInstance && (isCameraOn || isScreenSharing)) {
                setTimeout(() => {
                    const localBox = document.getElementById(`video-slot-local`);
                    if(localBox) { localBox.innerHTML = ""; zgEngine.createLocalStreamView(localStreamInstance).play(localBox); }
                }, 300);
            }
            for (let id in onlineRoomUsers) {
                const user = onlineRoomUsers[id]; appendVoiceCard(id, user.name, user.avatar, user.isMuted, false);
            }
        }

        function appendVoiceCard(uid, name, avatarSeed, mutedState, isMe) {
            const container = document.getElementById('voice-grid');
            const card = document.createElement('div'); card.id = `v-card-${uid}`; card.className = "voice-card";
            card.addEventListener('click', () => { card.classList.toggle('video-card-expanded'); });
            const videoSlotId = isMe ? "video-slot-local" : `video-slot-${uid}`;
            const muteBadgeHTML = mutedState ? `<div class="card-mute-badge">M</div>` : '';

            card.innerHTML = `
                <div id="${videoSlotId}" class="video-view-container"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="card-avatar-placeholder"></div>
                <div class="card-user-label">${escapeHTML(name)}</div>
                ${muteBadgeHTML}
            `;
            container.appendChild(card);
        }

        function broadcastUserInfo() {
            if(isEngineReady) {
                const payload = { type: "IDENTITY_SYNC", name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted, isCameraOn: isCameraOn, isScreenSharing: isScreenSharing, statusText: myInfo.statusText };
                zgEngine.sendBroadcastMessage(ZEGO_ROOM_ID, JSON.stringify(payload)).catch(()=>{});
            }
        }

        document.getElementById('btn-trigger-image').addEventListener('click', () => document.getElementById('image-loader').click());
        document.getElementById('image-loader').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file || file.size > 150 * 1024) return alert("请发送 150KB 内的小图资产。");
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const payload = { type: "IMAGE", msgId: "msg_"+Date.now(), channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content: evt.target.result, timestamp: Date.now() };
                renderMessage(payload);
                if(isEngineReady) await zgEngine.sendBroadcastMessage(ZEGO_ROOM_ID, JSON.stringify(payload));
            };
            reader.readAsDataURL(file); this.value = "";
        });

        document.getElementById('btn-disconnect-voice').addEventListener('click', () => leaveCurrentVoiceChannel());
        document.getElementById('btn-toggle-mic').addEventListener('click', async () => {
            isMuted = !isMuted; if(localStreamInstance) await zgEngine.mutePublishStreamAudio(localStreamInstance, isMuted);
            document.getElementById('btn-toggle-mic').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('btn-toggle-mic').style.color = isMuted ? "#ff85a2" : "#b5bac1";
            broadcastUserInfo(); updateVoiceUIRender();
        });

        document.getElementById('btn-change-bg').addEventListener('click', () => {
            currentBgIdx = (currentBgIdx + 1) % backgrounds.length;
            const root = document.getElementById('app-root');
            root.style.backgroundImage = backgrounds[currentBgIdx].startsWith('url') ? backgrounds[currentBgIdx] : '';
            root.style.background = backgrounds[currentBgIdx].startsWith('linear') ? backgrounds[currentBgIdx] : '';
        });

        // 🚨 语法完美闭合，彻底斩断上一版的卡死恶性死锁
        setInterval(() => { 
            if(myInfo.name && isEngineReady) {
                broadcastUserInfo(); 
            }
            refreshOnlineMemberList();
        }, 4000);

        function escapeHTML(str) { if (!str) return ''; return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
</html>
