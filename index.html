<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Sovereign Luxury Edition</title>
    <!-- 引入国内三大运营商 BGP 骨干网直连、最稳定的完整高版本 Tailwind CSS，彻底解决电脑端巨大化 Bug -->

    <!-- 引入即构科技 ZEGOCLOUD 官方 Web SDK (国内高速加速源) -->
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/zego-express-engine-webrtc/3.0.0/ZegoExpressWebRTC.js"></script>
    <!-- 引入加密组件 (字节跳动镜像源) -->
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* 像素级复刻：Discord 官方最新标准暗黑调色盘 */
        body { background-color: #111214; -webkit-tap-highlight-color: transparent; color: #dbdee1; font-size: 14px; }
        .bg-discord-guilds { background-color: #1e1f22; }
        .bg-discord-sidebar { background-color: #2b2d31; }
        .bg-discord-main { background-color: #313338; }
        .bg-discord-input { background-color: #383a40; }
        .bg-discord-userpanel { background-color: #232428; }
        
        .text-jirai-pink { color: #ff85a2; }
        .border-jirai-pink { border-color: #ff85a2; }
        .bg-jirai-pink { background-color: #ff85a2; }
        
        /* 移动端侧边抽屉平滑动画 */
        .sidebar-drawer { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Discord 经典圆角悬停动画 */
        .server-icon { transition: all 0.2s ease; border: 2px solid #1e1f22; }
        .server-icon:hover { border-radius: 16px !important; border-color: #ff85a2 !important; background-color: #ff85a2 !important; box-shadow: 0 0 15px #ff85a2; color: #000; }
        
        /* 聊天行原版悬停变色 */
        .chat-row { transition: background-color 0.1s ease; position: relative; }
        .chat-row:hover { background-color: rgba(0, 0, 0, 0.05); }
        .chat-row .msg-actions { opacity: 0; transition: opacity 0.1s ease; }
        .chat-row:hover .msg-actions { opacity: 1; }
        
        /* 经典左侧频道激活小竖条指示器 */
        .active-indicator { width: 4px; height: 20px; background-color: #ff85a2; border-radius: 0 4px 4px 0; position: absolute; left: 0; }
        
        /* 说话时粉红发光卡片 */
        .is-speaking { border-color: #ff85a2 !important; box-shadow: 0 0 18px rgba(255, 133, 162, 0.6) !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }

        /* 卡片多维大画布放大器 */
        .video-card-expanded {
            grid-column: 1 / -1 !important;
            grid-row: span 2 !important;
            aspect-ratio: 16 / 9 !important;
            z-index: 30;
            border-color: #ff85a2 !important;
        }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot-blink { animation: blink 1.4s infinite both; }
        .dot-blink:nth-child(2) { animation-delay: 0.2s; }
        .dot-blink:nth-child(3) { animation-delay: 0.4s; }
        
        .video-view-container video { object-fit: cover !important; border-radius: 8px; width: 100%; height: 100%; }
        #whiteboard-canvas { cursor: crosshair; touch-action: none; background-color: #1a1a24; }
    </style>
</head>
<body class="select-none overflow-hidden font-sans antialiased text-xs sm:text-sm">

    <input type="file" id="image-loader" accept="image/*" class="hidden">

    <script>
        const ZEGO_APP_ID = 1408717387; 
        const ZEGO_SERVER_SECRET = "0552daaa40a25d28c8c5fe74dc4af61e";
        const ZEGO_SERVER_URL = "wss://webliveroom" + ZEGO_APP_ID + "-api.zegocloud.com/ws";

        let zgEngine = null;
        let isEngineReady = false;
        let localStreamInstance = null;
        
        let myInfo = { uid: "", name: "", avatar: "Ares", activeRoomId: "", statusText: "🎀 处于混沌极点" };
        let onlineRoomUsers = {}; 
        let activeTextChannel = "chat-lobby";
        let isMuted = false, isCameraOn = false, isScreenSharing = false, isBoardOpen = false;
        let currentCameraFacing = "user"; 
        let typingTimeout = null;

        const canvas = document.getElementById('whiteboard-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        const backgrounds = [
            "linear-gradient(135deg, #111214 0%, #1e1f22 100%)",
            "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"
        ];
        let currentBgIdx = 0;

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // 导航抽屉
        const btnSidebar = document.getElementById('btn-trigger-sidebar');
        const sidebarWrapper = document.getElementById('sidebar-wrapper');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebarDrawer(show) {
            if (show) { sidebarWrapper.classList.remove('-translate-x-full'); sidebarOverlay.classList.remove('hidden'); }
            else { sidebarWrapper.classList.add('-translate-x-full'); sidebarOverlay.classList.add('hidden'); }
        }
        btnSidebar.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebarDrawer(true); });
        sidebarOverlay.addEventListener('click', () => toggleSidebarDrawer(false));

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            if (touchEndX - touchStartX > 70 && touchStartX < window.innerWidth / 3) toggleSidebarDrawer(true);
            if (touchStartX - touchEndX > 70) toggleSidebarDrawer(false);
        }, {passive: true});

        // 契约选择
        let selectedSeed = "Ares";
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('border-jirai-pink', 'bg-discord-guilds'));
                e.target.classList.add('border-jirai-pink', 'bg-discord-guilds');
                selectedSeed = e.target.dataset.avatar;
            });
        });
        document.querySelector('.avatar-option').classList.add('border-jirai-pink', 'bg-discord-guilds');

        document.getElementById('btn-enter').addEventListener('click', async () => {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return alert("名号不可为空白！");

            myInfo.uid = "user_" + Math.floor(Math.random() * 899999 + 100000);
            myInfo.name = name;
            myInfo.avatar = selectedSeed;

            document.getElementById('my-name').innerText = name;
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${selectedSeed}`;
            document.getElementById('login-overlay').classList.add('hidden');

            await initZegoEngine();
            await switchTextChannel("chat-lobby");
            
            if (isMobileDevice) {
                document.getElementById('screen-btn-text').innerText = "翻转镜头";
            }
            initCanvasResize(); 
        });

        function generateZegoRoomToken(roomID, userID) {
            const expiredTime = Math.floor(Date.now() / 1000) + 7200; 
            const nonce = Math.floor(Math.random() * 2147483647);
            const tokenObj = { appid: ZEGO_APP_ID, roomid: roomID, userid: userID, privilege: { 1: 1, 2: 1 }, nonce: nonce, expired: expiredTime };
            const tokenStr = JSON.stringify(tokenObj);
            const hash = CryptoJS.HmacSHA256(tokenStr, ZEGO_SERVER_SECRET);
            const signature = hash.toString(CryptoJS.enc.Hex);
            const finalPayload = { token: btoa(tokenStr), signature: signature };
            return btoa(JSON.stringify(finalPayload));
        }

        async function initZegoEngine() {
            try {
                zgEngine = new ZegoExpressEngine(ZEGO_APP_ID, ZEGO_SERVER_URL);
                isEngineReady = true;

                zgEngine.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                    if (updateType === 'ADD') {
                        for (let stream of streamList) {
                            const remoteStream = await zgEngine.startPlayingStream(stream.streamID);
                            const userMeta = JSON.parse(stream.extraInfo || "{}");
                            
                            onlineRoomUsers[stream.user.userID] = {
                                name: userMeta.name || stream.user.userName,
                                avatar: userMeta.avatar || "Ares",
                                streamID: stream.streamID,
                                isMuted: userMeta.isMuted || false
                            };
                            
                            updateVoiceUIRender();
                            refreshOnlineMemberList();
                            
                            setTimeout(() => {
                                const slot = document.getElementById(`video-slot-${stream.user.userID}`);
                                if(slot && remoteStream) { slot.innerHTML = ""; zgEngine.createRemoteStreamView(remoteStream).play(slot); }
                            }, 500);
                        }
                    } else if (updateType === 'DELETE') {
                        for (let stream of streamList) {
                            zgEngine.stopPlayingStream(stream.streamID);
                            delete onlineRoomUsers[stream.user.userID];
                            updateVoiceUIRender(); refreshOnlineMemberList();
                        }
                    }
                });

                zgEngine.on('IMRecvBroadcastMessage', (roomID, chatData) => {
                    chatData.forEach(msg => {
                        try {
                            const data = JSON.parse(msg.message);
                            if(data.channelId === activeTextChannel && msg.fromUser.userID !== myInfo.uid) { renderMessage(data); }
                        } catch(e){}
                    });
                });

                zgEngine.on('IMRecvCustomCommand', (roomID, fromUser, command) => {
                    try {
                        const data = JSON.parse(command);
                        if(data.type === "TYPING" && data.channelId === activeTextChannel && fromUser.userID !== myInfo.uid) showTypingIndicator(data.senderName);
                        if(data.type === "REACTION" && data.channelId === activeTextChannel) executeLocalReactionAppend(data.targetMsgId, data.emoji);
                        if(data.type === "PIN_MSG" && data.channelId === activeTextChannel) { document.getElementById('pinned-text').innerText = data.content; document.getElementById('pinned-banner').classList.remove('hidden'); }
                        if(data.type === "DELETE_MSG" && data.channelId === activeTextChannel) { const el = document.getElementById(data.targetMsgId); if(el) el.remove(); }
                        if(data.type === "DRAW_PATH" && isBoardOpen) {
                            drawLocalLine(data.x1 * canvas.width, data.y1 * canvas.height, data.x2 * canvas.width, data.y2 * canvas.height, false);
                        }
                        if(data.type === "CLEAR_BOARD") {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                        }
                    } catch(e){}
                });

                zgEngine.on('roomUserUpdate', () => { refreshOnlineMemberList(); });
            } catch (err) { console.error(err); }
        }

        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); e.stopPropagation();
                if(isPublishingLock) return;
                executeSendAction();
            }
        });

        async function executeSendAction() {
            const content = chatInput.value.trim();
            if(!content) return;

            isPublishingLock = true;
            const msgId = "msg_" + Date.now();
            const payload = { type: "TEXT", msgId, channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content, timestamp: Date.now() };

            renderMessage(payload);
            chatInput.value = ""; chatInput.focus();

            if(isEngineReady && myInfo.activeRoomId) {
                try { await zgEngine.sendBroadcastMessage(myInfo.activeRoomId, JSON.stringify(payload)); } catch (e){}
            }
            isPublishingLock = false;
        }

        chatInput.addEventListener('input', () => {
            if(isEngineReady && myInfo.activeRoomId) {
                zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify({ type: "TYPING", senderName: myInfo.name, channelId: activeTextChannel })).catch(()=>{});
            }
        });

        function renderMessage(msg) {
            const container = document.getElementById('chat-messages'); if(!container) return;
            const isImage = msg.type === "IMAGE";
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const row = document.createElement('div');
            row.id = msg.msgId || ("local_" + Date.now());
            row.className = "flex items-start space-x-3 text-xs sm:text-sm px-4 py-1 chat-row mx-[-16px] relative rounded-xl transition";
            
            let contentHTML = isImage 
                ? `<img src="${msg.content}" class="mt-1.5 max-w-xs max-h-40 rounded-xl border border-neutral-900 object-cover cursor-zoom-in" onclick="window.open('${msg.content}')">`
                : `<p class="text-neutral-200 select-text leading-relaxed break-all">${escapeHTML(msg.content)}</p>`;

            row.innerHTML = `
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${msg.senderAvatar}" class="w-8 h-8 rounded-full bg-discord-guilds flex-shrink-0 mt-0.5 border border-neutral-800">
                <div class="flex-1 min-w-0">
                    <div class="flex items-baseline space-x-2"><span class="font-semibold text-white hover:underline cursor-pointer">${escapeHTML(msg.senderName)}</span><span class="text-[9px] text-neutral-500">${timeStr}</span></div>
                    ${contentHTML}
                    <div class="reaction-box flex items-center space-x-1 mt-1 flex-wrap gap-1"></div>
                </div>
                <div class="msg-actions absolute right-4 top-1 bg-discord-guilds border border-jirai-pink/10 rounded-lg flex text-[10px] overflow-hidden z-10 shadow-lg">
                    <button class="px-1.5 py-0.5 hover:bg-jirai-pink hover:text-black text-neutral-400 font-bold" onclick="sendReaction('${row.id}', '🖤')">🖤</button>
                    <button class="px-1.5 py-0.5 hover:bg-jirai-pink hover:text-black text-neutral-400 font-bold" onclick="sendReaction('${row.id}', '🎀')">🎀</button>
                    <button class="px-1.5 py-0.5 hover:bg-jirai-pink hover:text-black text-neutral-400" onclick="pinThisMessage('${row.id}')">📌</button>
                    ${msg.senderUid === myInfo.uid ? `<button class="px-1.5 py-0.5 hover:bg-red-600 hover:text-white text-neutral-400" onclick="deleteMyMessage('${row.id}')">🗑️</button>` : ''}
                </div>
            `;
            container.appendChild(row); container.scrollTop = container.scrollHeight;
        }

        function sendReaction(msgId, emoji) {
            executeLocalReactionAppend(msgId, emoji);
            if(isEngineReady && myInfo.activeRoomId) {
                zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify({ type: "REACTION", channelId: activeTextChannel, targetMsgId: msgId, emoji: emoji })).catch(()=>{});
            }
        }

        function executeLocalReactionAppend(msgId, emoji) {
            const row = document.getElementById(msgId); if(!row) return;
            const box = row.querySelector('.reaction-box'); if(!box) return;
            let existingPill = box.querySelector(`[data-emoji="${emoji}"]`);
            if(existingPill) {
                let countEl = existingPill.querySelector('.count'); countEl.innerText = parseInt(countEl.innerText) + 1;
            } else {
                const pill = document.createElement('div'); pill.dataset.emoji = emoji;
                pill.className = "bg-discord-input border border-jirai-pink/10 rounded px-1.5 py-0.5 text-[9px] text-jirai-pink flex items-center space-x-1 font-bold";
                pill.innerHTML = `<span>${emoji}</span><span class="count">1</span>`;
                box.appendChild(pill);
            }
        }

        function pinThisMessage(msgId) {
            const row = document.getElementById(msgId); if(!row) return;
            const text = row.querySelector('p') ? row.querySelector('p').innerText : '[媒体素材附件]';
            document.getElementById('pinned-text').innerText = text; document.getElementById('pinned-banner').classList.remove('hidden');
            if(isEngineReady && myInfo.activeRoomId) {
                zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify({ type: "PIN_MSG", channelId: activeTextChannel, content: text })).catch(()=>{});
            }
        }

        function deleteMyMessage(msgId) {
            const el = document.getElementById(msgId); if(el) el.remove();
            if(isEngineReady && myInfo.activeRoomId) {
                zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify({ type: "DELETE_MSG", channelId: activeTextChannel, targetMsgId: msgId })).catch(()=>{});
            }
        }

        function showTypingIndicator(name) {
            const box = document.getElementById('typing-indicator'); document.getElementById('typing-text').innerText = name;
            box.classList.remove('hidden'); box.classList.add('flex');
            clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { box.classList.add('hidden'); }, 2000);
        }

        async function switchTextChannel(channelId) {
            toggleSidebarDrawer(false); if(myInfo.activeRoomId === channelId) return;
            if(myInfo.activeRoomId && isEngineReady) { try { await zgEngine.logoutRoom(myInfo.activeRoomId); } catch(e){} }

            activeTextChannel = channelId; myInfo.activeRoomId = channelId;
            document.getElementById('chat-messages').innerHTML = ""; document.getElementById('pinned-banner').classList.add('hidden');
            
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title').innerHTML = `<span class="text-neutral-500 mr-1">#</span> <span>${itemEl ? itemEl.innerText.substring(1).trim() : channelId}</span>`;
            document.getElementById('panel-chat').classList.remove('hidden'); document.getElementById('panel-voice').classList.add('hidden');

            document.querySelectorAll('.active-indicator').forEach(el => el.remove());
            if(itemEl) {
                const indicator = document.createElement('div'); indicator.className = "active-indicator";
                itemEl.appendChild(indicator);
            }

            if(isEngineReady) {
                const token = generateZegoRoomToken(channelId, myInfo.uid);
                await zgEngine.loginRoom(channelId, token, { userID: myInfo.uid, userName: myInfo.name }, { userUpdate: true });
                refreshOnlineMemberList();
            }
        }

        async function switchVoiceChannel(channelId) {
            toggleSidebarDrawer(false); if(myInfo.activeRoomId === channelId) return;
            await leaveCurrentVoiceChannel();

            myInfo.activeRoomId = channelId;
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title').innerHTML = `<span class="mr-1.5">🔮</span> <span>${itemEl ? itemEl.innerText.substring(1).trim() : channelId}</span>`;
            
            document.getElementById('panel-chat').classList.add('hidden'); document.getElementById('panel-voice').classList.remove('hidden');
            document.getElementById('voice-status-pill').classList.remove('hidden'); document.getElementById('btn-disconnect-voice').classList.remove('hidden');

            try {
                const token = generateZegoRoomToken(channelId, myInfo.uid);
                await zgEngine.loginRoom(channelId, token, { userID: myInfo.uid, userName: myInfo.name }, { userUpdate: true });
                
                localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: false } });
                await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                
                updateVoiceUIRender(); refreshOnlineMemberList();
            } catch (err) { console.error(err); }
        }

        async function leaveCurrentVoiceChannel() {
            if(isCameraOn) await toggleCameraStream();
            if(isScreenSharing) await toggleScreenStream();
            if(isBoardOpen) toggleWhiteboardLayer(); 
            if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); localStreamInstance = null; }
            if(myInfo.activeRoomId && isEngineReady) { await zgEngine.logoutRoom(myInfo.activeRoomId); }
            
            myInfo.activeRoomId = ""; isCameraOn = false; isScreenSharing = false;
            document.getElementById('voice-status-pill').classList.add('hidden'); document.getElementById('btn-disconnect-voice').classList.add('hidden');
            updateVoiceUIRender(); switchTextChannel("chat-lobby");
        }

        async function toggleCameraStream() {
            if(!myInfo.activeRoomId) return;
            try {
                if(!isCameraOn) {
                    if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                    localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: true, facingMode: currentCameraFacing } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                    isCameraOn = true;
                    document.getElementById('btn-toggle-video').classList.add('bg-pink-500', 'text-black');
                    updateVoiceUIRender();
                } else {
                    if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                    localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: false } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                    isCameraOn = false; document.getElementById('btn-toggle-video').classList.remove('bg-pink-500', 'text-black');
                    updateVoiceUIRender();
                }
            } catch(e){}
        }

        async function toggleScreenStream() {
            if(!myInfo.activeRoomId) return;
            
            if (isMobileDevice) {
                if(!isCameraOn) return alert("请先开启视讯镜头再点击翻转哦🎀");
                currentCameraFacing = (currentCameraFacing === "user") ? "environment" : "user";
                isCameraOn = false; await toggleCameraStream(); return;
            }

            if(!isScreenSharing) {
                try {
                    if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                    localStreamInstance = await zgEngine.createStream({ screen: { audio: false, video: true } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                    isScreenSharing = true;
                    document.getElementById('btn-toggle-screen').classList.add('bg-pink-500', 'text-black');
                    updateVoiceUIRender();
                } catch(e){}
            } else {
                isScreenSharing = false; document.getElementById('btn-toggle-screen').classList.remove('bg-pink-500', 'text-black');
                if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: false } });
                await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                updateVoiceUIRender();
            }
        }

        function toggleWhiteboardLayer() {
            const area = document.getElementById('whiteboard-area');
            isBoardOpen = !isBoardOpen;
            if(isBoardOpen) {
                area.classList.remove('hidden'); area.classList.add('flex');
                document.getElementById('btn-toggle-board').classList.add('bg-pink-500', 'text-black');
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight - 40;
                setupCanvasStyle();
            } else {
                area.classList.remove('flex'); area.classList.add('hidden');
                document.getElementById('btn-toggle-board').classList.remove('bg-pink-500', 'text-black');
            }
        }
        document.getElementById('btn-toggle-board').addEventListener('click', toggleWhiteboardLayer);

        function setupCanvasStyle() {
            ctx.strokeStyle = '#ff85a2'; 
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = 3;
        }

        function drawLocalLine(x1, y1, x2, y2, emitBroadcast = true) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            if(emitBroadcast && isEngineReady && myInfo.activeRoomId) {
                const drawCmd = {
                    type: "DRAW_PATH",
                    channelId: activeTextChannel,
                    x1: x1 / canvas.width,
                    y1: y1 / canvas.height,
                    x2: x2 / canvas.width,
                    y2: y2 / canvas.height
                };
                zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify(drawCmd)).catch(()=>{});
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; [lastX, lastY] = [e.offsetX, e.offsetY]; });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            drawLocalLine(lastX, lastY, e.offsetX, e.offsetY, true);
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.touches[0].clientX - rect.left;
            lastY = e.touches[0].clientY - rect.top;
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const currentX = e.touches[0].clientX - rect.left;
            const currentY = e.touches[0].clientY - rect.top;
            drawLocalLine(lastX, lastY, currentX, currentY, true);
            [lastX, lastY] = [currentX, currentY];
        }, { passive: true });

        document.getElementById('btn-clear-board').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(isEngineReady && myInfo.activeRoomId) {
                zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify({ type: "CLEAR_BOARD", channelId: activeTextChannel })).catch(()=>{});
            }
        });

        function initCanvasResize() {
            window.addEventListener('resize', () => {
                if(isBoardOpen) {
                    const temp = ctx.getImageData(0,0,canvas.width,canvas.height);
                    canvas.width = canvas.parentElement.clientWidth;
                    canvas.height = canvas.parentElement.clientHeight - 40;
                    setupCanvasStyle();
                    ctx.putImageData(temp,0,0);
                }
            });
        }

        async function refreshOnlineMemberList() {
            if(!isEngineReady || !myInfo.activeRoomId) return;
            try {
                const result = await zgEngine.getRoomUserList(myInfo.activeRoomId);
                const listContainer = document.getElementById('member-list'); if(!listContainer) return;
                listContainer.innerHTML = "";
                let count = 0;
                appendMemberItem(myInfo.name, myInfo.avatar, myInfo.statusText, true); count++;
                if(result && result.userList) {
                    result.userList.forEach(user => {
                        if(user.userID === myInfo.uid) return;
                        appendMemberItem(user.userName, "Ares", "🎀 已在大厅连线", false); count++;
                    });
                }
                document.getElementById('member-count').innerText = count;
            } catch(e){}
        }

        // 显式缩写字体大小，锁死 PC 端的展现
        function appendMemberItem(name, avatarSeed, status, isMe) {
            const listContainer = document.getElementById('member-list');
            const item = document.createElement('div'); item.className = "flex flex-col p-1 hover:bg-neutral-700/30 rounded-xl cursor-pointer transition text-xs";
            item.innerHTML = `<div class="flex items-center space-x-2"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="w-5 h-5 rounded-full bg-jirai-blacker"><span class="font-medium text-neutral-200 truncate flex-1">${escapeHTML(name)} ${isMe ? '<span class="text-jirai-pink font-bold text-[9px]">[我]</span>':''}</span></div><div class="text-[9px] text-neutral-500 pl-7 truncate">${escapeHTML(status)}</div>`;
            listContainer.appendChild(item);
        }

        document.querySelectorAll('.channel-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const currentBtn = e.currentTarget;
                const type = currentBtn.dataset.type;
                const target = currentBtn.dataset.channel;

                document.querySelectorAll('.channel-item').forEach(i => {
                    i.className = "channel-item relative flex items-center px-2 py-1.5 rounded text-neutral-400 hover:bg-neutral-700/30 hover:text-gray-200 cursor-pointer text-xs transition";
                });
                currentBtn.className = "channel-item relative flex items-center px-2 py-1.5 rounded text-white bg-neutral-700/40 cursor-pointer text-xs font-medium transition";
                
                if (type === 'text') switchTextChannel(target); 
                else if (type === 'voice') switchVoiceChannel(target);
            });
        });

        function updateVoiceUIRender() {
            const container = document.getElementById('voice-grid'); if(!container) return;
            if(!myInfo.activeRoomId || document.getElementById('panel-voice').classList.contains('hidden')) return;
            container.innerHTML = "";

            appendVoiceCard(myInfo.uid, myInfo.name, myInfo.avatar, isMuted, true);
            if(localStreamInstance && (isCameraOn || isScreenSharing)) {
                setTimeout(() => {
                    const localBox = document.getElementById(`video-slot-local`);
                    if(localBox) { localBox.innerHTML = ""; zgEngine.createLocalStreamView(localStreamInstance).play(localBox); }
                }, 300);
            }

            for (let id in onlineRoomUsers) {
                const user = onlineRoomUsers[id];
                appendVoiceCard(id, user.name, user.avatar, user.isMuted, false);
            }
        }

        function appendVoiceCard(uid, name, avatarSeed, mutedState, isMe) {
            const container = document.getElementById('voice-grid');
            const card = document.createElement('div'); card.id = `v-card-${uid}`;
            card.className = "bg-discord-guilds rounded-2xl flex flex-col items-center justify-center relative aspect-video border border-neutral-950 overflow-hidden shadow-md cursor-pointer transition-all duration-300";
            
            card.addEventListener('click', () => { card.classList.toggle('video-card-expanded'); });

            const videoSlotId = isMe ? "video-slot-local" : `video-slot-${uid}`;
            const muteBadgeHTML = mutedState ? `<div class="absolute bottom-2 right-2 bg-pink-600 text-white rounded-full px-2 py-0.5 text-[9px] leading-none z-10 font-bold">已静音</div>` : '';

            card.innerHTML = `
                <div id="${videoSlotId}" class="video-view-container absolute inset-0 w-full h-full flex items-center justify-center bg-black/40">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="w-10 h-10 rounded-full bg-jirai-blacker border border-neutral-800">
                </div>
                <div class="absolute bottom-2 left-2 text-[10px] font-medium text-white px-2 py-0.5 bg-black/60 rounded-lg backdrop-blur-sm z-10 truncate max-w-[70%]">${escapeHTML(name)}</div>
                ${muteBadgeHTML}
            `;
            container.appendChild(card);
        }

        document.getElementById('btn-trigger-image').addEventListener('click', () => document.getElementById('image-loader').click());
        document.getElementById('image-loader').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file || file.size > 150 * 1024) return alert("请发送 150KB 内的小图资产。");
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const payload = { type: "IMAGE", msgId: "msg_"+Date.now(), channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content: evt.target.result, timestamp: Date.now() };
                renderMessage(payload);
                if(isEngineReady && myInfo.activeRoomId) { await zgEngine.sendBroadcastMessage(myInfo.activeRoomId, JSON.stringify(payload)); }
            };
            reader.readAsDataURL(file); this.value = "";
        });

        document.getElementById('btn-disconnect-voice').addEventListener('click', () => leaveCurrentVoiceChannel());
        document.getElementById('btn-toggle-mic').addEventListener('click', async () => {
            isMuted = !isMuted;
            if(localStreamInstance) { await zgEngine.mutePublishStreamAudio(localStreamInstance, isMuted); }
            document.getElementById('btn-toggle-mic').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('btn-toggle-mic').classList.toggle('text-pink-400', isMuted);
            updateVoiceUIRender();
        });

        document.getElementById('btn-change-bg').addEventListener('click', () => {
            currentBgIdx = (currentBgIdx + 1) % backgrounds.length;
            const root = document.getElementById('app-root');
            root.style.backgroundImage = backgrounds[currentBgIdx].startsWith('url') ? backgrounds[currentBgIdx] : '';
            root.style.background = backgrounds[currentBgIdx].startsWith('linear') ? backgrounds[currentBgIdx] : '';
        });

        setInterval(() => { if(myInfo.name && isEngineReady && myInfo.activeRoomId) {
            zgEngine.sendCustomCommand(myInfo.activeRoomId, JSON.stringify({ type: "IDENTITY", name: myInfo.name, avatar: myInfo.avatar, rtcUid: myInfo.uid, voiceChannel: myInfo.activeRoomId, isMuted: isMuted, statusText: myInfo.statusText })).catch(()=>{});
        }}, 5000);
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
</html>
