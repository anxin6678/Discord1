<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Jirai-Kei Perfection Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
    <script src="https://download.agora.io/sdk/release/agora-rtm-2.2.0.js"></script>
    <style>
        body { background-color: #070709; -webkit-tap-highlight-color: transparent; color: #f3f4f6; }
        .bg-jirai-blacker { background-color: #040406; }
        .bg-jirai-dark { background-color: #0b0b0f; }
        .bg-jirai-main { background-color: #101018; }
        .bg-jirai-input { background-color: #161622; }
        
        .text-jirai-pink { color: #ff85a2; }
        .border-jirai-pink { border-color: #ff85a2; }
        .bg-jirai-pink { background-color: #ff85a2; }
        
        .sidebar-drawer { transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .server-icon { transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid #161622; }
        .server-icon:hover { border-radius: 14px !important; border-color: #ff85a2 !important; background-color: #ff85a2 !important; box-shadow: 0 0 15px #ff85a2; color: #000; }
        
        .chat-row { transition: background-color 0.15s ease; position: relative; }
        .chat-row:hover { background-color: #151522; }
        .chat-row .msg-actions { opacity: 0; transition: opacity 0.1s ease; }
        .chat-row:hover .msg-actions { opacity: 1; }
        
        .is-speaking { border-color: #ff85a2 !important; box-shadow: 0 0 18px rgba(255, 133, 162, 0.8) !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0b0f; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff85a2; border-radius: 10px; }

        .video-card-expanded {
            grid-column: 1 / -1 !important;
            grid-row: span 2 !important;
            aspect-ratio: 16 / 9 !important;
            z-index: 30;
            border-color: #ff85a2 !important;
            box-shadow: 0 0 25px rgba(255, 133, 162, 0.3);
        }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot-blink { animation: blink 1.4s infinite both; }
        .dot-blink:nth-child(2) { animation-delay: 0.2s; }
        .dot-blink:nth-child(3) { animation-delay: 0.4s; }
        
        .video-view-container video { object-fit: cover !important; border-radius: 12px; }
        
        /* Whiteboard Canvas */
        #wb-canvas { cursor: crosshair; touch-action: none; }
    </style>
</head>
<body class="select-none overflow-hidden font-sans antialiased text-xs sm:text-sm">

    <!-- 登录遮罩层 -->
    <div id="login-overlay" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-jirai-dark p-6 sm:p-8 rounded-2xl w-full max-w-md border border-jirai-pink/30 text-center shadow-2xl">
            <div class="text-3xl mb-1 tracking-widest">🖤 𝔍𝔦𝔯𝔞𝔦 𝔎𝔢𝔦 🖤</div>
            <h2 class="text-base font-bold mb-1 text-white">地雷物语 · 契约大厅</h2>
            <p class="text-[9px] text-jirai-pink mb-6 tracking-widest uppercase">Agora Voice & Collaborative Canvas</p>
            
            <label class="block text-left text-[11px] font-bold text-gray-400 uppercase mb-2 tracking-wide">您的专属名号 🎀</label>
            <input type="text" id="username-input" maxlength="12" placeholder="输入进入结界的花名..." class="w-full p-2.5 bg-jirai-blacker rounded-xl focus:outline-none focus:ring-1 focus:ring-jirai-pink mb-6 text-white border border-neutral-800 text-sm">
            
            <label class="block text-left text-[11px] font-bold text-gray-400 uppercase mb-2 tracking-wide">契约默认头像 🖤</label>
            <div class="flex justify-between mb-8 px-2" id="avatar-selector">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ares" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Ares">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Zeus" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Zeus">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hades" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Hades">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Poseidon" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Poseidon">
            </div>
            
            <button id="btn-enter" class="w-full bg-jirai-pink hover:bg-pink-400 text-black font-extrabold py-2.5 rounded-xl text-sm transition-all shadow-md tracking-widest">连通结界 🖤</button>
        </div>
    </div>

    <!-- 头像/个签深度自定义模态框 -->
    <div id="profile-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-jirai-dark p-5 rounded-2xl w-full max-w-sm border border-jirai-pink/30">
            <h3 class="text-sm font-bold text-white mb-4 text-center">🎀 调整你的缔约印记</h3>
            <div class="flex flex-col items-center space-y-3 mb-4">
                <img id="modal-avatar-preview" src="" class="w-16 h-16 rounded-full border border-jirai-pink bg-jirai-blacker">
                <button id="btn-upload-avatar" class="text-[10px] bg-jirai-input text-jirai-pink border border-jirai-pink/30 px-2 py-1 rounded">更新自定义头像文件</button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] text-gray-400 block mb-1">新的花名</label>
                    <input type="text" id="modal-name-input" class="w-full p-2 bg-jirai-blacker border border-neutral-800 rounded-lg text-white focus:outline-none focus:border-jirai-pink text-xs">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 block mb-1">混沌个签</label>
                    <input type="text" id="modal-status-input" class="w-full p-2 bg-jirai-blacker border border-neutral-800 rounded-lg text-white focus:outline-none focus:border-jirai-pink text-xs">
                </div>
            </div>
            <div class="flex space-x-2 mt-5">
                <button id="btn-profile-cancel" class="flex-1 py-1.5 bg-neutral-900 rounded-xl text-gray-400 text-xs">作废</button>
                <button id="btn-profile-save" class="flex-1 py-1.5 bg-jirai-pink text-black font-bold rounded-xl text-xs">刻入契约</button>
            </div>
        </div>
    </div>

    <!-- 主体架构 -->
    <div id="app-root" class="flex h-screen w-screen bg-jirai-main overflow-hidden relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden transition-opacity"></div>

        <!-- 侧边栏包装 -->
        <div id="sidebar-wrapper" class="sidebar-drawer fixed lg:static inset-y-0 left-0 flex z-40 transform -translate-x-full lg:translate-x-0 flex-shrink-0">
            <!-- 最左侧小组件条 -->
            <div class="w-16 bg-jirai-blacker flex flex-col items-center py-3 space-y-3 flex-shrink-0 border-r border-jirai-pink/5">
                <div id="btn-home-view" class="server-icon w-11 h-11 bg-jirai-dark rounded-[22px] flex items-center justify-center cursor-pointer text-jirai-pink font-extrabold text-base shadow" title="日常混沌空间">🖤</div>
                <div id="btn-whiteboard-view" class="server-icon w-11 h-11 bg-jirai-dark rounded-[22px] flex items-center justify-center cursor-pointer text-gray-400 text-base shadow" title="协作魔法白板">🎨</div>
                <div class="w-6 h-[1px] bg-neutral-900 rounded"></div>

            </div>

            <!-- 频道与状态栏 -->
            <div class="w-52 bg-jirai-dark flex flex-col justify-between flex-shrink-0 border-r border-jirai-pink/5">
                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <div class="h-12 border-b border-jirai-blacker flex items-center px-4 font-bold text-jirai-pink tracking-wider">真言结界 🩰</div>
                    <div class="p-2 space-y-4">
                        <div>
                            <div class="text-[10px] font-bold text-neutral-500 px-2 mb-1.5 uppercase tracking-wider">文字板块</div>
                            <div class="space-y-0.5" id="text-channels-container">
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-jirai-pink bg-jirai-pink/10 border border-jirai-pink/10 cursor-pointer text-sm font-medium transition" data-type="text" data-channel="chat-lobby">
                                    <span class="mr-2 text-neutral-600 font-bold">#</span> <span>日常沉沦大厅</span>
                                </div>
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-jirai-main/30 hover:text-gray-200 cursor-pointer text-sm transition" data-type="text" data-channel="announcements">
                                    <span class="mr-2 text-neutral-600 font-bold">#</span> <span>契约置顶榜</span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="text-[10px] font-bold text-neutral-500 px-2 mb-1.5 uppercase tracking-wider">语音多媒体连线</div>
                            <div class="space-y-0.5" id="voice-channels-container">
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-jirai-main/30 hover:text-gray-200 cursor-pointer text-sm transition" data-type="voice" data-channel="voice-lobby">
                                    <span class="mr-2">🔮</span> <span>千重夜话连线厅</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 底部个人信息面板：Discord高度拟真 -->
                <div class="h-14 bg-jirai-blacker flex items-center justify-between px-2 flex-shrink-0 border-t border-jirai-pink/5">
                    <div class="flex items-center space-x-1.5 overflow-hidden cursor-pointer group" id="user-profile-trigger" title="点击重铸个人契约">
                        <img id="my-avatar" src="" class="w-8 h-8 rounded-full bg-neutral-800 border border-jirai-pink/20 object-cover">
                        <div class="text-xs font-semibold truncate max-w-[85px]">
                            <p id="my-name" class="text-white truncate leading-tight"></p>
                            <span id="my-status-text" class="text-neutral-500 text-[9px] block leading-none mt-0.5 truncate">🎀 保持沉沦</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-1">
                        <button id="btn-toggle-mic" class="p-2 hover:bg-jirai-main hover:text-jirai-pink rounded-xl transition text-sm" title="静音/解除静音">🎙️</button>
                        <button id="btn-disconnect-voice" class="p-2 bg-red-950/40 text-red-400 hover:bg-red-900 border border-red-500/10 rounded-xl hidden transition text-sm" title="断开多媒体连线">❌</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主工作区 -->
        <div class="flex-1 flex flex-col min-w-0 bg-transparent relative" id="main-content-zone">
            <!-- 顶部导航栏 -->
            <div class="h-12 border-b border-jirai-blacker flex items-center justify-between px-4 font-bold text-white shadow-sm flex-shrink-0 z-10 bg-jirai-dark/70 backdrop-blur-md">
                <div class="flex items-center space-x-3">
                    <button id="btn-trigger-sidebar" class="block lg:hidden text-jirai-pink text-xl hover:text-white transition p-2 bg-jirai-input rounded-xl border border-jirai-pink/10">☰</button>
                    <div class="flex items-center space-x-2" id="room-title">
                        <span class="text-jirai-pink text-xl">#</span> <span>日常沉沦大厅</span>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <div id="pinned-banner" class="hidden text-xs bg-jirai-pink/5 border border-jirai-pink/20 rounded-xl px-2.5 py-1 text-jirai-pink max-w-[120px] sm:max-w-xs truncate">
                        📌 <b>置顶:</b> <span id="pinned-text">暂无消息</span>
                    </div>
                    <span id="voice-status-pill" class="text-[9px] bg-jirai-pink/10 text-jirai-pink px-2 py-0.5 rounded border border-jirai-pink/20 hidden font-bold tracking-widest">RTC ON</span>
                </div>
            </div>
            
            <!-- 下部左右分流区 -->
            <div class="flex-1 flex overflow-hidden w-full relative">
                
                <!-- 模块一：普通聊天面板 -->
                <div id="panel-chat" class="flex-1 flex flex-col min-w-0 bg-transparent">
                    <div id="chat-messages" class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 bg-jirai-main/10"></div>
                    <div id="typing-indicator" class="px-4 h-5 text-xs text-neutral-500 hidden items-center space-x-1">
                        <span id="typing-text" class="font-medium text-jirai-pink"></span> <span class="text-[10px]">正在轻敲字...</span>
                        <div class="flex space-x-0.5 items-center pt-0.5"><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span><span class="w-1 h-1 bg-jirai-pink rounded-full dot-blink"></span></div>
                    </div>
                    <div class="px-4 pb-6 pt-1 flex-shrink-0">
                        <div class="bg-jirai-input rounded-xl px-4 py-2.5 flex items-center space-x-3 shadow-md border border-jirai-pink/5 focus-within:border-jirai-pink/20 transition-all duration-300">
                            <button id="btn-trigger-image" class="text-neutral-400 hover:text-jirai-pink transition text-base">➕</button>
                            <input type="text" id="chat-input" placeholder="输入消息后敲击键盘发送..." class="flex-1 bg-transparent text-sm focus:outline-none text-neutral-100 placeholder-neutral-600" autocomplete="off">
                        </div>
                    </div>
                </div>

                <!-- 模块二：多媒体视讯面板 -->
                <div id="panel-voice" class="flex-1 p-3 sm:p-4 flex flex-col hidden bg-black/20">
                    <div class="mb-3 p-2 bg-jirai-dark border border-jirai-pink/10 rounded-xl flex items-center justify-around sm:justify-center space-x-2 sm:space-x-4 flex-shrink-0 shadow-lg">
                        <button id="btn-toggle-video" class="px-4 py-1.5 bg-jirai-input hover:bg-jirai-pink hover:text-black rounded-lg border border-jirai-pink/10 transition flex items-center space-x-1 text-xs"><span>📷</span> <span>视讯连线</span></button>
                        <button id="btn-toggle-screen" class="px-4 py-1.5 bg-jirai-input hover:bg-jirai-pink hover:text-black rounded-lg border border-jirai-pink/10 transition flex items-center space-x-1 text-xs"><span>🖥️</span> <span id="screen-btn-text">共享屏幕</span></button>
                    </div>
                    <div id="voice-grid" class="flex-1 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 overflow-y-auto custom-scrollbar"></div>
                </div>

                <!-- 模块三：新增实时协作电子白板面板 -->
                <div id="panel-whiteboard" class="flex-1 flex flex-col hidden bg-jirai-blacker p-3">
                    <div class="mb-2 flex items-center justify-between bg-jirai-dark p-2 rounded-xl border border-neutral-800">
                        <span class="text-xs text-jirai-pink font-bold">🔮 实时下生协作灵卷</span>
                        <button id="btn-clear-wb" class="px-3 py-1 bg-red-950/40 text-red-400 border border-red-500/20 rounded-lg text-[10px]">清空画布</button>
                    </div>
                    <div class="flex-1 relative bg-[#0d0d13] rounded-xl border border-neutral-900 overflow-hidden">
                        <canvas id="wb-canvas" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                </div>

                <!-- 右侧在线缔约者列表 -->
                <div class="w-52 bg-jirai-dark flex flex-col border-l border-jirai-blacker hidden lg:flex flex-shrink-0">
                    <div class="p-3 text-[11px] font-bold text-neutral-400 uppercase tracking-wider border-b border-jirai-blacker">大厅缔约者 — <span id="member-count" class="text-jirai-pink">1</span></div>
                    <div id="member-list" class="flex-1 overflow-y-auto custom-scrollbar px-2 pt-2 space-y-0.5"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- 隐藏的文件选择器 -->
    <input type="file" id="image-loader" accept="image/*" class="hidden">
    <input type="file" id="avatar-uploader" accept="image/*" class="hidden">

    <script>
        const APP_ID = "e610017f5b374fa2a84e4bce9c50c66a";
        
        let rtcClient = null;
        let rtmClient = null;
        let isPublishingLock = false;
        let isRtmReady = false; 
        
        let localTracks = { audioTrack: null, videoTrack: null, screenTrack: null };
        // 核心修正：优化数据结构，头像支持 base64 或者 dicebear 种子
        let myInfo = { uid: "", name: "", avatar: "Ares", activeVoiceChannel: null, rtcUid: null, statusText: "🎀 处于混沌极点" };
        let onlineUsers = {};
        let activeTextChannel = "chat-lobby";
        let isMuted = false, isCameraOn = false, isScreenSharing = false;
        let currentCameraFacing = "user"; 
        let typingTimeout = null;

        // 白板绘图状态
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        const wbCanvas = document.getElementById('wb-canvas');
        const wbCtx = wbCanvas.getContext('2d');

        const backgrounds = [
            "linear-gradient(135deg, #07070a 0%, #101018 100%)",
            "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"
        ];
        let currentBgIdx = 0;

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // --- 抽屉侧向手势滑动控制器 ---
        const btnSidebar = document.getElementById('btn-trigger-sidebar');
        const sidebarWrapper = document.getElementById('sidebar-wrapper');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebarDrawer(show) {
            if (show) {
                sidebarWrapper.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebarWrapper.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
            }
        }
        btnSidebar.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebarDrawer(true); });
        sidebarOverlay.addEventListener('click', () => toggleSidebarDrawer(false));

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            if (touchEndX - touchStartX > 60 && touchStartX < window.innerWidth / 3) toggleSidebarDrawer(true);
            if (touchStartX - touchEndX > 60) toggleSidebarDrawer(false);
        }, {passive: true});

        // 登录头像选择
        let selectedSeed = "Ares";
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('border-jirai-pink', 'bg-jirai-main'));
                e.target.classList.add('border-jirai-pink', 'bg-jirai-main');
                selectedSeed = e.target.dataset.avatar;
            });
        });
        document.querySelector('.avatar-option').classList.add('border-jirai-pink', 'bg-jirai-main');

        // 进入大厅主进程
        document.getElementById('btn-enter').addEventListener('click', async () => {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return alert("名号不可为空白！");

            myInfo.uid = "user_" + Math.floor(Math.random() * 899999 + 100000);
            myInfo.name = name;
            myInfo.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${selectedSeed}`;

            updateLocalProfileUI();
            document.getElementById('login-overlay').classList.add('hidden');

            await initAgoraServices();
            await switchTextChannel("chat-lobby");
            initWhiteboardEventListener();
            
            if (isMobileDevice) {
                document.getElementById('screen-btn-text').innerText = "翻转镜头";
            }
        });

        function updateLocalProfileUI() {
            document.getElementById('my-name').innerText = myInfo.name;
            document.getElementById('my-avatar').src = myInfo.avatar;
            document.getElementById('my-status-text').innerText = myInfo.statusText;
        }

        // --- Agora核心音视频与实时消息服务初始化 ---
        async function initAgoraServices() {
            try {
                rtcClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                
                rtcClient.on("user-published", async (user, mediaType) => {
                    await rtcClient.subscribe(user, mediaType);
                    if (mediaType === "audio") { user.audioTrack.play(); }
                    if (mediaType === "video") {
                        setTimeout(() => {
                            const remoteContainer = document.getElementById(`video-slot-${user.uid}`);
                            if(remoteContainer) { remoteContainer.innerHTML = ""; user.videoTrack.play(remoteContainer); }
                        }, 500);
                    }
                    updateVoiceUIRender();
                });

                rtcClient.on("user-unpublished", () => { updateVoiceUIRender(); });

                rtcClient.enableAudioVolumeIndicator();
                rtcClient.on("volume-indicator", volumes => {
                    volumes.forEach(volume => {
                        const card = document.getElementById(`v-card-${volume.uid}`);
                        if (card && volume.level > 4) card.classList.add('is-speaking');
                        else if(card) card.classList.remove('is-speaking');
                    });
                });

                rtmClient = new AgoraRTM.RTM(APP_ID, myInfo.uid);
                await rtmClient.login();
                isRtmReady = true;

                rtmClient.addEventListener("message", (event) => { handleIncomingRTMEvent(event); });
                rtmClient.addEventListener("presence", () => { refreshOnlineMemberList(); });
            } catch (err) {
                console.error("多媒体服务初始化异常:", err);
            }
        }

        // --- 聊天发送端逻辑控制 (修复对方名字看不到的隐患) ---
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();

        // --- RTM 消息总线中央分发系统 ---
        function handleIncomingRTMEvent(event) {
            try {
                const data = JSON.parse(event.message);
                
                // 收到全网节点身份认证簿
                if (data.type === "IDENTITY") {
                    onlineUsers[event.publisher] = { 
                        name: data.name, 
                        avatar: data.avatar, 
                        rtcUid: data.rtcUid, 
                        voiceChannel: data.voiceChannel, 
                        isMuted: data.isMuted, 
                        statusText: data.statusText 
                    };
                    updateVoiceUIRender(); 
                    refreshOnlineMemberList(); 
                    return;
                }
                if (data.type === "TYPING" && data.channelId === activeTextChannel && event.publisher !== myInfo.uid) {
                    showTypingIndicator(data.senderName); return;
                }
                if (data.type === "DELETE_MSG" && data.channelId === activeTextChannel) {
                    const el = document.getElementById(data.targetMsgId); if(el) el.remove(); return;
                }
                if (data.type === "PIN_MSG" && data.channelId === activeTextChannel) {
                    document.getElementById('pinned-text').innerText = data.content;
                    document.getElementById('pinned-banner').classList.remove('hidden'); return;
                }
                if (data.type === "REACTION" && data.channelId === activeTextChannel) {
                    executeLocalReactionAppend(data.targetMsgId, data.emoji); return;
                }
                // 收到白板多点路径坐标广播
                if (data.type === "WB_DRAW" && activeTextChannel === "chat-lobby") {
                    drawRemoteLine(data.x1, data.y1, data.x2, data.y2); return;
                }
                if (data.type === "WB_CLEAR" && activeTextChannel === "chat-lobby") {
                    wbCtx.clearRect(0, 0, wbCanvas.width, wbCanvas.height); return;
                }
                
                // 渲染常规和媒体图片消息
                if (data.channelId === activeTextChannel && event.publisher !== myInfo.uid) {
                    renderMessage(data);
                }
            } catch (e) {}
        }

        async function switchVoiceChannel(channelId) {

            await leaveCurrentVoiceChannel();

            document.getElementById('panel-chat').classList.add('hidden');

                const numericUid = Math.floor(Math.random() * 8999999 + 1000000); myInfo.rtcUid = numericUid;
                await rtcClient.join(APP_ID, channelId, null, numericUid);
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true, AGC: true });
                if(isMuted) await localTracks.audioTrack.setMuted(true);

            if (rtcClient) { await rtcClient.leave(); }
            myInfo.activeVoiceChannel = null; myInfo.rtcUid = null;

        // --- 多媒体视讯核心模块（集成镜头翻转） ---
        async function toggleCameraStream() {
            if(!myInfo.activeVoiceChannel) return;
            if(!isCameraOn) {
                try {
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ facingMode: currentCameraFacing });
                    await rtcClient.publish(localTracks.videoTrack);
                    isCameraOn = true;
                    document.getElementById('btn-toggle-video').classList.add('bg-pink-500', 'text-black');
                    const localVideoBox = document.getElementById(`video-slot-local`);
                    if(localVideoBox) { localVideoBox.innerHTML = ""; localTracks.videoTrack.play(localVideoBox); }
                } catch(e) { alert("调取相机失败"); }
            } else {
                if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); await rtcClient.unpublish(localTracks.videoTrack); localTracks.videoTrack = null; }
                isCameraOn = false; document.getElementById('btn-toggle-video').classList.remove('bg-pink-500', 'text-black');
                updateVoiceUIRender();
            }
        }

        async function toggleScreenStream() {
            if(!myInfo.activeVoiceChannel) return;
            
            // 移动端处理：平滑降级切换为前后摄像头反转
            if (isMobileDevice) {
                if(!isCameraOn) return alert("请先开启视讯连线，然后再翻转镜头！");
                currentCameraFacing = (currentCameraFacing === "user") ? "environment" : "user";
                if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); await rtcClient.unpublish(localTracks.videoTrack); }
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ facingMode: currentCameraFacing });
                await rtcClient.publish(localTracks.videoTrack);
                const localVideoBox = document.getElementById(`video-slot-local`);
                if(localVideoBox) { localVideoBox.innerHTML = ""; localTracks.videoTrack.play(localVideoBox); }
                return;
            }

            // PC 浏览器端处理：标准高画质屏幕共享投屏
            if(!isScreenSharing) {
                try {
                    localTracks.screenTrack = await AgoraRTC.createScreenVideoTrack({ encoderConfig: "1080p_1" });
                    await rtcClient.publish(localTracks.screenTrack);
                    isScreenSharing = true;
                    document.getElementById('btn-toggle-screen').classList.add('bg-pink-500', 'text-black');
                    const localVideoBox = document.getElementById(`video-slot-local`);
                    if(localVideoBox) { localVideoBox.innerHTML = ""; localTracks.screenTrack.play(localVideoBox); }
                    localTracks.screenTrack.on("track-ended", () => { toggleScreenStream(); });
                } catch(e) { console.warn("屏幕捕捉异常终止"); }
            } else {
                if(localTracks.screenTrack) { localTracks.screenTrack.stop(); localTracks.screenTrack.close(); await rtcClient.unpublish(localTracks.screenTrack); localTracks.screenTrack = null; }
                isScreenSharing = false; document.getElementById('btn-toggle-screen').classList.remove('bg-pink-500', 'text-black');
                updateVoiceUIRender();
            }
        }
