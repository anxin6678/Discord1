<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Jirai-Kei Perfection (Async Ultimate Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #070709; -webkit-tap-highlight-color: transparent; color: #f3f4f6; }
        .bg-jirai-blacker { background-color: #040406; }
        .bg-jirai-dark { background-color: #0b0b0f; }
        .bg-jirai-main { background-color: #101018; }
        .bg-jirai-input { background-color: #161622; }
        
        .text-jirai-pink { color: #ff85a2; }
        .border-jirai-pink { border-color: #ff85a2; }
        .bg-jirai-pink { background-color: #ff85a2; }
        
        .sidebar-drawer { transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .server-icon { transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid #161622; }
        .server-icon:hover { border-radius: 14px !important; border-color: #ff85a2 !important; background-color: #ff85a2 !important; box-shadow: 0 0 15px #ff85a2; color: #000; }
        
        .chat-row { transition: background-color 0.15s ease; position: relative; }
        .chat-row:hover { background-color: #151522; }
        
        .is-speaking { border-color: #ff85a2 !important; box-shadow: 0 0 18px rgba(255, 133, 162, 0.8) !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0b0f; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff85a2; border-radius: 10px; }

        .video-card-expanded {
            grid-column: 1 / -1 !important;
            grid-row: span 2 !important;
            aspect-ratio: 16 / 9 !important;
            z-index: 30;
            border-color: #ff85a2 !important;
            box-shadow: 0 0 25px rgba(255, 133, 162, 0.3);
        }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot-blink { animation: blink 1.4s infinite both; }
        
        .video-view-container video { object-fit: contain !important; width: 100%; height: 100%; border-radius: 12px; background-color: #000; }
    </style>
</head>
<body class="select-none overflow-hidden font-sans antialiased text-xs sm:text-sm">

    <div id="login-overlay" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-jirai-dark p-6 sm:p-8 rounded-2xl w-full max-w-md border border-jirai-pink/30 text-center shadow-2xl">
            <div class="text-3xl mb-1 tracking-widest">🖤 𝔍𝔦𝔯𝔞𝔦 𝔎𝔢𝔦 🖤</div>
            <h2 class="text-base font-bold mb-1 text-white">地雷物语 · 空间自适应大厅</h2>
            <p class="text-[9px] text-jirai-pink mb-6 tracking-widest uppercase">Async Async Non-Blocking Engine</p>
            
            <label class="block text-left text-[11px] font-bold text-gray-400 uppercase mb-2 tracking-wide">您的专属名号 🎀</label>
            <input type="text" id="username-input" maxlength="12" placeholder="输入进入结界的花名..." class="w-full p-2.5 bg-jirai-blacker rounded-xl focus:outline-none focus:ring-1 focus:ring-jirai-pink mb-6 text-white border border-neutral-800 text-sm">
            
            <label class="block text-left text-[11px] font-bold text-gray-400 uppercase mb-2 tracking-wide">契约头像 🖤</label>
            <div class="flex justify-between mb-8 px-2" id="avatar-selector">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ares" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-jirai-pink bg-jirai-main transition hover:scale-105" data-avatar="Ares">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Zeus" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Zeus">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hades" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Hades">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Poseidon" class="avatar-option w-12 h-12 rounded-full cursor-pointer border-2 border-transparent bg-jirai-blacker transition hover:scale-105" data-avatar="Poseidon">

            <button id="btn-enter" class="w-full bg-jirai-pink hover:bg-pink-400 text-black font-extrabold py-2.5 rounded-xl text-sm transition-all shadow-md tracking-widest">连通结界 🖤</button>

    <div id="app-root" class="flex h-screen w-screen bg-jirai-main overflow-hidden relative">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden transition-opacity"></div>

        <div id="sidebar-wrapper" class="sidebar-drawer fixed lg:static inset-y-0 left-0 flex z-40 transform -translate-x-full lg:translate-x-0 flex-shrink-0">
            <div class="w-16 bg-jirai-blacker flex flex-col items-center py-3 space-y-3 flex-shrink-0 border-r border-jirai-pink/5">
                <div class="server-icon w-11 h-11 bg-jirai-dark rounded-[22px] flex items-center justify-center cursor-pointer text-jirai-pink font-extrabold text-base shadow">🖤</div>
                <div class="w-6 h-[1px] bg-neutral-900 rounded"></div>
                <button id="btn-change-bg" class="server-icon w-11 h-11 bg-jirai-input rounded-[22px] flex items-center justify-center cursor-pointer text-base">🔮</button>
            </div>

            <div class="w-52 bg-jirai-dark flex flex-col justify-between flex-shrink-0 border-r border-jirai-pink/5">
                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <div class="h-12 border-b border-jirai-blacker flex items-center px-4 font-bold text-jirai-pink tracking-wider">真言结界 🩰</div>
                    <div class="p-2 space-y-4">
                        <div>
                            <div class="text-[10px] font-bold text-neutral-500 px-2 mb-1.5 uppercase tracking-wider">文字板块</div>
                            <div class="space-y-0.5" id="text-channels-container">
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-jirai-pink bg-jirai-pink/10 border border-jirai-pink/10 cursor-pointer text-sm font-medium transition" data-type="text" data-channel="chat-lobby">
                                    <span class="mr-2 text-neutral-600 font-bold">#</span> <span>日常沉沦大厅</span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="text-[10px] font-bold text-neutral-500 px-2 mb-1.5 uppercase tracking-wider">语音多媒体连线</div>
                            <div class="space-y-0.5" id="voice-channels-container">
                                <div class="channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-jirai-main/30 hover:text-gray-200 cursor-pointer text-sm transition" data-type="voice" data-channel="voice-lobby">
                                    <span class="mr-2">🔮</span> <span>千重夜话连线厅</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="h-14 bg-jirai-blacker flex items-center justify-between px-2 flex-shrink-0 border-t border-jirai-pink/5">
                    <div class="flex items-center space-x-1.5 overflow-hidden cursor-pointer group" id="user-profile-trigger">
                        <img id="my-avatar" src="" class="w-8 h-8 rounded-full bg-neutral-800 border border-jirai-pink/20">
                        <div class="text-xs font-semibold truncate max-w-[85px]">
                            <p id="my-name" class="text-white truncate leading-tight"></p>
                            <span id="my-status-text" class="text-neutral-500 text-[9px] block leading-none mt-0.5 truncate">🎀 设置签名...</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-1">
                        <button id="btn-toggle-mic" class="p-2 hover:bg-jirai-main hover:text-jirai-pink rounded-xl transition text-sm">🎙️</button>
                        <button id="btn-disconnect-voice" class="p-2 bg-red-950/40 text-red-400 hover:bg-red-900 border border-red-500/10 rounded-xl hidden transition text-sm">❌</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-w-0 bg-transparent relative" id="main-content-zone">
            <div class="h-12 border-b border-jirai-blacker flex items-center justify-between px-4 font-bold text-white shadow-sm flex-shrink-0 z-10 bg-jirai-dark/70 backdrop-blur-md">
                <div class="flex items-center space-x-3">
                    <button id="btn-trigger-sidebar" class="block lg:hidden text-jirai-pink text-xl hover:text-white transition p-2 bg-jirai-input rounded-xl border border-jirai-pink/10">☰</button>
                    <div class="flex items-center space-x-2" id="room-title">
                        <span class="text-jirai-pink text-xl">#</span> <span>日常沉沦大厅</span>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <span id="voice-status-pill" class="text-[9px] bg-jirai-pink/10 text-jirai-pink px-2 py-0.5 rounded border border-jirai-pink/20 hidden font-bold tracking-widest">P2P LIVE</span>
                </div>
            </div>
            
            <div class="flex-1 flex overflow-hidden">
                <div id="panel-chat" class="flex-1 flex flex-col min-w-0 bg-transparent">
                    <div id="chat-messages" class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 bg-jirai-main/10"></div>
                    <div class="px-4 pb-6 pt-1 flex-shrink-0">
                        <div class="bg-jirai-input rounded-xl px-4 py-2.5 flex items-center space-x-3 shadow-md border border-jirai-pink/5 focus-within:border-jirai-pink/20 transition-all duration-300">
                            <button id="btn-trigger-image" class="text-neutral-400 hover:text-jirai-pink transition text-base">➕</button>
                            <input type="text" id="chat-input" placeholder="输入消息后敲击键盘发送..." class="flex-1 bg-transparent text-sm focus:outline-none text-neutral-100 placeholder-neutral-600" autocomplete="off">
                        </div>
                    </div>
                </div>

                <div id="panel-voice" class="flex-1 p-3 sm:p-4 flex flex-col hidden bg-black/20">
                    <div class="mb-3 p-2 bg-jirai-dark border border-jirai-pink/10 rounded-xl flex items-center justify-around sm:justify-center space-x-2 sm:space-x-4 flex-shrink-0 shadow-lg">
                        <button id="btn-toggle-video" class="px-4 py-1.5 bg-jirai-input hover:bg-jirai-pink hover:text-black rounded-lg border border-jirai-pink/10 transition flex items-center space-x-1 text-xs"><span>📷</span> <span>视讯连线</span></button>
                        <button id="btn-toggle-screen" class="px-4 py-1.5 bg-jirai-input hover:bg-jirai-pink hover:text-black rounded-lg border border-jirai-pink/10 transition flex items-center space-x-1 text-xs"><span>🖥️</span> <span>共享屏幕</span></button>
                    </div>
                    <div id="voice-grid" class="flex-1 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 overflow-y-auto custom-scrollbar"></div>
                </div>

                <div class="w-52 bg-jirai-dark flex flex-col border-l border-jirai-blacker hidden lg:flex flex-shrink-0">
                    <div class="p-3 text-[11px] font-bold text-neutral-400 uppercase tracking-wider border-b border-jirai-blacker">大厅缔约者 — <span id="member-count" class="text-jirai-pink">1</span></div>
                    <div id="member-list" class="flex-1 overflow-y-auto custom-scrollbar px-2 pt-2 space-y-0.5"></div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="image-loader" accept="image/*" class="hidden">

    <script>
        // 全局基础属性定义
        let peer = null;
        let mqttClient = null;
        let localMicTrack = null;    
        let localCameraTrack = null; 
        let screenVideoTrack = null; 
        let activeCalls = {};        
        
        let myInfo = { uid: "", name: "", avatar: "Ares", activeVoiceChannel: null, statusText: "🎀 处于混沌极点" };
        let onlineUsers = {};
        let activeTextChannel = "chat-lobby";
        let isMuted = false, isCameraOn = false, isScreenSharing = false;
        let isFallbackMode = false; 

        const backgrounds = ["linear-gradient(135deg, #07070a 0%, #101018 100%)", "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"];
        let currentBgIdx = 0;

        // --- 核心修复：移动端/桌面端抽屉栏基础函数控制流 ---
        function toggleSidebarDrawer(show) {
            const wrapper = document.getElementById('sidebar-wrapper');
            const overlay = document.getElementById('sidebar-overlay');
            if(!wrapper || !overlay) return;
            if (show) {
                wrapper.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                wrapper.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // --- 契约头像选择器 ---
        let selectedSeed = "Ares";
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('border-jirai-pink', 'bg-jirai-main'));
                e.currentTarget.classList.add('border-jirai-pink', 'bg-jirai-main');
                selectedSeed = e.currentTarget.dataset.avatar;
            });
        });

        // --- 零阻塞即时秒登大厅驱动器 ---
        document.getElementById('btn-enter').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return alert("名号不可为空白！");

            myInfo.uid = "jirai_" + Math.floor(Math.random() * 899999 + 100000);
            myInfo.name = name;
            myInfo.avatar = selectedSeed;

            document.getElementById('my-name').innerText = name;
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${myInfo.avatar}`;
            
            // 🚨 终极漏洞修补：不论网络脚本加载有多慢，点完按钮瞬间无条件关闭遮罩展现大厅！
            document.getElementById('login-overlay').classList.add('hidden');
            switchTextChannel("chat-lobby");

            // 启动异步无阻塞后台网络链条注入
            asyncInjectNetworkComponents();
        });

        // --- 核心修复：动态脚本注入器（完美避开 CDN 被墙导致的页面卡死） ---
        function loadScriptAsync(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function asyncInjectNetworkComponents() {
            try {
                // 后台静默抓取 Cloudflare 与开源组件
                await loadScriptAsync("https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js");
                await loadScriptAsync("https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js");
                
                // 校验组件是否激活
                if (typeof Peer === 'undefined' || typeof mqtt === 'undefined') {
                    throw new Error("CDN 组件加载空指针异常");
                }
                
                // 组件正常，开辟 P2P 网格
                initWebRTCPlatform();
            } catch(e) {
                console.warn("公网资源握手超时或阻断，系统激活高拟真本地伴生保护。原因: " + e.message);
                activateSandboxCompanion(e.message);
            }
        }

        // 伴生自适应沙盒注入模块
        function activateSandboxCompanion(reason) {
            if (onlineUsers["jirai_sugar_mock"]) return; 
            isFallbackMode = true;
            
            document.getElementById('voice-status-pill').innerText = "SANDBOX LOCAL";
            document.getElementById('voice-status-pill').classList.remove('hidden');

            simulateIncomingUser("jirai_sugar_mock", "糖糖酱酱 🎀", "Zeus", "🎀 绝赞渴望中...");
            
            renderMessage({
                type: "TEXT",
                msgId: "sys_protection_msg",
                channelId: activeTextChannel,
                senderUid: "system",
                senderName: "🔮 空间防护姬",
                senderAvatar: "Hades",
                content: `【大厅保护机制已激活】当前由于缺少独立的 WebRTC 安全域上下文（必须通过本地服务器 http://localhost 启动），或公网握手节点受阻（错误信息: ${reason}），结界已自动切换为全保真沙盒运转形态。您现在依然可以无限制打字聊天（糖糖酱会智能陪聊）、发送小图附件、实时捕获本地摄像头/共享屏幕媒体挂载、以及调试麦克风指示灯光晕！🖤`,
                timestamp: Date.now()
            });
        }

        // --- WebRTC 网格基础连接架构 ---
        function initWebRTCPlatform() {
            try {
                peer = new Peer(myInfo.uid);
                peer.on('open', (id) => {
                    initSignalingBridge();
                });

                peer.on('call', (call) => {
                    activeCalls[call.peer] = call;
                    call.answer(generateCurrentMixedStream());
                    call.on('stream', (remoteStream) => { handleRemoteStreamConnected(call.peer, remoteStream); });
                });
            } catch(e) { activateSandboxCompanion(e.message); }
        }

        function initSignalingBridge() {
            try {
                mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                mqttClient.on('connect', () => {
                    mqttClient.subscribe(`jirai/room/${activeTextChannel}`);
                    broadcastPresence();
                });

                mqttClient.on('message', (topic, message) => {
                    try {
                        const packet = JSON.parse(message.toString());
                        if(packet.senderUid === myInfo.uid) return;

                        if (packet.type === "PRESENCE") {
                            onlineUsers[packet.senderUid] = { name: packet.name, avatar: packet.avatar, status: packet.statusText, inVoice: packet.inVoice };
                            refreshOnlineMemberList();
                            if (myInfo.activeVoiceChannel && packet.inVoice === myInfo.activeVoiceChannel && packet.senderUid > myInfo.uid) {
                                initiateWebRTCCall(packet.senderUid);
                            }
                        } else if (packet.type === "TEXT" || packet.type === "IMAGE") {
                            renderMessage(packet);
                        } else if (packet.type === "LEAVE_VOICE") {
                            removeRemoteUserCard(packet.senderUid);
                        }
                    } catch(e) {}
                });
            } catch(e) {}
        }

        function broadcastPresence() {
            if(!mqttClient || !mqttClient.connected) return;
            mqttClient.publish(`jirai/room/${activeTextChannel}`, JSON.stringify({
                type: "PRESENCE", senderUid: myInfo.uid, name: myInfo.name, avatar: myInfo.avatar, statusText: myInfo.statusText, inVoice: myInfo.activeVoiceChannel
            }));
        }

        function generateCurrentMixedStream() {
            const tracks = [];
            if (localMicTrack) tracks.push(localMicTrack);
            if (isScreenSharing && screenVideoTrack) { tracks.push(screenVideoTrack); } 
            else if (isCameraOn && localCameraTrack) { tracks.push(localCameraTrack); }
            return new MediaStream(tracks);
        }

        function broadcastStreamUpdate() {
            if (!mqttClient || !mqttClient.connected || !myInfo.activeVoiceChannel) return;
            const freshStream = generateCurrentMixedStream();
            
            mqttClient.publish(`jirai/room/${activeTextChannel}`, JSON.stringify({
                type: "RENEGOTIATE", senderUid: myInfo.uid, channel: myInfo.activeVoiceChannel
            }));

            for (let targetUid in onlineUsers) {
                if (onlineUsers[targetUid].inVoice === myInfo.activeVoiceChannel) {
                    if (activeCalls[targetUid]) activeCalls[targetUid].close();
                    const call = peer.call(targetUid, freshStream);
                    activeCalls[targetUid] = call;
                    call.on('stream', (remoteStream) => { handleRemoteStreamConnected(targetUid, remoteStream); });
                }
            }
        }

        function initiateWebRTCCall(targetUid) {
            if(!peer || !myInfo.activeVoiceChannel) return;
            const outboundStream = generateCurrentMixedStream();
            const call = peer.call(targetUid, outboundStream);
            activeCalls[targetUid] = call;
            call.on('stream', (remoteStream) => { handleRemoteStreamConnected(targetUid, remoteStream); });
            call.on('close', () => { removeRemoteUserCard(targetUid); });
            call.on('error', () => { removeRemoteUserCard(targetUid); });
        }

        function handleRemoteStreamConnected(remoteUid, remoteStream) {
            let slot = document.getElementById(`video-slot-${remoteUid}`);
            if(!slot) { updateVoiceUIRender(); slot = document.getElementById(`video-slot-${remoteUid}`); }
            if(slot) {
                if (remoteStream.getVideoTracks().length > 0) {
                    slot.innerHTML = `<video id="raw-media-${remoteUid}" autoplay playsinline></video>`;
                    const video = document.getElementById(`raw-media-${remoteUid}`);
                    video.srcObject = remoteStream;
                    video.play().catch(e => {});
                } else {
                    slot.innerHTML = `<img src="https://api.dicebear.com/7.x/bottts/svg?seed=${onlineUsers[remoteUid]?.avatar || 'Ares'}" class="w-12 h-12 rounded-full bg-jirai-blacker border border-neutral-800">`;
                }
            }
        }

        // --- 音视频驱动设备流抓取控制器 ---
        async function switchVoiceChannel(channelId) {
            myInfo.activeVoiceChannel = channelId;
            updateChannelStyles('voice', channelId);

            document.getElementById('panel-chat').classList.add('hidden'); 
            document.getElementById('panel-voice').classList.remove('hidden');
            document.getElementById('voice-status-pill').classList.remove('hidden'); 
            document.getElementById('btn-disconnect-voice').classList.remove('hidden');

            try {
                if(!localMicTrack) {
                    const initAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    localMicTrack = initAudioStream.getAudioTracks()[0];
                    if(isMuted) localMicTrack.enabled = false;
                }
                updateVoiceUIRender();
                setupLocalAudioAnalyser();
                broadcastPresence();
                broadcastStreamUpdate(); 
            } catch(e) {
                console.warn("无物理音视频物理权限，进入本地容器自适应伪挂载。");
                updateVoiceUIRender();
            }
        }

        async function toggleScreenStream() {
            if(!myInfo.activeVoiceChannel) return;
            if(!isScreenSharing) {
                try {
                    const rawScreenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    screenVideoTrack = rawScreenStream.getVideoTracks()[0];
                    isScreenSharing = true;
                    document.getElementById('btn-toggle-screen').classList.add('bg-pink-500', 'text-black');
                    screenVideoTrack.onended = () => { stopScreenSharing(); };
                    updateVoiceUIRender();
                    broadcastStreamUpdate();
                } catch(e) {}
            } else { stopScreenSharing(); }
        }

        function stopScreenSharing() {
            if(screenVideoTrack) { screenVideoTrack.stop(); screenVideoTrack = null; }
            isScreenSharing = false;
            document.getElementById('btn-toggle-screen').classList.remove('bg-pink-500', 'text-black');
            updateVoiceUIRender();
            broadcastStreamUpdate();
        }

        async function toggleCameraStream() {
            if(!myInfo.activeVoiceChannel) return;
            if(!isCameraOn) {
                try {
                    const camStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    localCameraTrack = camStream.getVideoTracks()[0];
                    isCameraOn = true;
                    document.getElementById('btn-toggle-video').classList.add('bg-pink-500', 'text-black');
                } catch(e) { alert("没有检测到可用的物理摄像头设备。"); }
            } else {
                if(localCameraTrack) { localCameraTrack.stop(); localCameraTrack = null; }
                isCameraOn = false;
                document.getElementById('btn-toggle-video').classList.remove('bg-pink-500', 'text-black');
            }
            updateVoiceUIRender();
            broadcastStreamUpdate();
        }

        function leaveCurrentVoiceChannel() {
            if(isScreenSharing) { screenVideoTrack.stop(); screenVideoTrack = null; isScreenSharing = false; }
            if(isCameraOn) { localCameraTrack.stop(); localCameraTrack = null; isCameraOn = false; }
            document.getElementById('btn-toggle-video').classList.remove('bg-pink-500', 'text-black');
            document.getElementById('btn-toggle-screen').classList.remove('bg-pink-500', 'text-black');

            for(let id in activeCalls) { activeCalls[id].close(); }
            activeCalls = {};
            if(!isFallbackMode && mqttClient && mqttClient.connected) { mqttClient.publish(`jirai/room/${activeTextChannel}`, JSON.stringify({type: "LEAVE_VOICE", senderUid: myInfo.uid})); }

            myInfo.activeVoiceChannel = null;
            document.getElementById('voice-status-pill').classList.add('hidden'); 
            document.getElementById('btn-disconnect-voice').classList.add('hidden');
            switchTextChannel("chat-lobby");
        }

        document.getElementById('btn-toggle-mic').addEventListener('click', () => {
            isMuted = !isMuted;
            if(localMicTrack) { localMicTrack.enabled = !isMuted; }
            document.getElementById('btn-toggle-mic').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('btn-toggle-mic').classList.toggle('text-pink-400', isMuted);
        });

        // --- 多媒体 UI 视窗渲染同步 ---
        function updateVoiceUIRender() {
            const container = document.getElementById('voice-grid'); if(!container) return;
            if(myInfo.activeVoiceChannel === null) { container.innerHTML = ""; return; }
            container.innerHTML = "";

            appendVoiceCard("local", myInfo.name, myInfo.avatar, isMuted);
            const localBox = document.getElementById('video-slot-local');
            if((isScreenSharing || isCameraOn) && localBox) {
                localBox.innerHTML = `<video id="native-preview-local" autoplay playsinline muted></video>`;
                const v = document.getElementById('native-preview-local');
                v.srcObject = generateCurrentMixedStream();
                v.play().catch(()=>{});
            }

            for(let id in onlineUsers) {
                if(onlineUsers[id].inVoice === myInfo.activeVoiceChannel) {
                    appendVoiceCard(id, onlineUsers[id].name, onlineUsers[id].avatar, false);
                    if(activeCalls[id] && activeCalls[id].remoteStream) { handleRemoteStreamConnected(id, activeCalls[id].remoteStream); }
                }
            }
        }

        function appendVoiceCard(uid, name, avatarSeed, mutedState) {
            const container = document.getElementById('voice-grid');
            const card = document.createElement('div'); card.id = `v-card-${uid}`;
            card.className = "bg-jirai-dark rounded-2xl flex flex-col items-center justify-center relative aspect-video border border-neutral-950 overflow-hidden shadow-md cursor-pointer transition-all duration-300";
            card.addEventListener('click', () => { card.classList.toggle('video-card-expanded'); });
            
            const displayMute = mutedState ? 'block' : 'none';
            card.innerHTML = `
                <div id="video-slot-${uid}" class="video-view-container absolute inset-0 w-full h-full flex items-center justify-center bg-black/40">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="w-12 h-12 rounded-full bg-jirai-blacker border border-neutral-800">
                </div>
                <div class="absolute bottom-2 left-2 text-[10px] font-medium text-white px-2 py-0.5 bg-black/60 rounded-lg backdrop-blur-sm z-10 truncate max-w-[70%]">${escapeHTML(name)}</div>
                <div id="mute-tag-${uid}" style="display: ${displayMute}" class="absolute bottom-2 right-2 bg-pink-600 text-white rounded-full px-2 py-0.5 text-[9px] leading-none z-10">已静音</div>
            `;
            container.appendChild(card);
        }

        function removeRemoteUserCard(uid) {
            const card = document.getElementById(`v-card-${uid}`); if(card) card.remove();
            if(activeCalls[uid]) { try { activeCalls[uid].close(); } catch(e){} delete activeCalls[uid]; }
            if(onlineUsers[uid]) onlineUsers[uid].inVoice = null;
            refreshOnlineMemberList();
        }

        function setupLocalAudioAnalyser() {
            if(!localMicTrack) return;
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const tempStream = new MediaStream([localMicTrack]);
                const source = audioContext.createMediaStreamSource(tempStream);
                source.connect(analyser);
                analyser.fftSize = 32;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function detectFrame() {
                    if(!myInfo.activeVoiceChannel) return;
                    requestAnimationFrame(detectFrame);
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0; for(let i=0; i<bufferLength; i++) { sum += dataArray[i]; }
                    let avg = sum / bufferLength;

                    const localCard = document.getElementById('v-card-local');
                    if(localCard) {
                        if(avg > 15 && !isMuted) localCard.classList.add('is-speaking');
                        else localCard.classList.remove('is-speaking');
                    }
                }
                detectFrame();
            } catch(e){}
        }

        // --- 文字消息核心发送流 ---
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); executeSendAction(); } });

        function executeSendAction() {
            const content = chatInput.value.trim();
            if(!content) return;
            const msgId = "msg_" + Date.now();
            const payload = { type: "TEXT", msgId, channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content, timestamp: Date.now() };
            renderMessage(payload);
            
            chatInput.value = ""; chatInput.focus();

            if(mqttClient && mqttClient.connected) {
                mqttClient.publish(`jirai/room/${activeTextChannel}`, JSON.stringify(payload));
            }

            if (onlineUsers["jirai_sugar_mock"]) {
                setTimeout(() => {
                    const sugarReplies = [
                        "听到了啦……在这个坏掉的世界线里，你只要看着我一个人就好了。🖤",
                        "捕捉到契约者的电波了！不要乱跑哦，我一直都在注视着你。🎀",
                        "就算公网阻断也无所谓，在这个小小的秘密结界里，只有我们两个人最安全了……🩰",
                        "精神快要超载了呢……多打字和我说说话，绝对不准离开这个房间。🖤"
                    ];
                    renderMessage({
                        type: "TEXT",
                        msgId: "sugar_" + Date.now(),
                        channelId: activeTextChannel,
                        senderUid: "jirai_sugar_mock",
                        senderName: "糖糖酱酱 🎀",
                        senderAvatar: "Zeus",
                        content: sugarReplies[Math.floor(Math.random() * sugarReplies.length)],
                        timestamp: Date.now()
                    });
                }, 900);
            }
        }

        function switchTextChannel(channelId) {
            toggleSidebarDrawer(false);
            updateChannelStyles('text', channelId);

            if(mqttClient && mqttClient.connected && activeTextChannel !== channelId) {
                mqttClient.unsubscribe(`jirai/room/${activeTextChannel}`);
                activeTextChannel = channelId;
                mqttClient.subscribe(`jirai/room/${activeTextChannel}`);
            }
            document.getElementById('chat-messages').innerHTML = "";
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title').innerHTML = `<span class="text-jirai-pink text-xl mr-1">#</span> <span>${itemEl ? itemEl.innerText.replace('#','').trim() : channelId}</span>`;
            document.getElementById('panel-chat').classList.remove('hidden'); document.getElementById('panel-voice').classList.add('hidden');
            broadcastPresence(); refreshOnlineMemberList();
        }

        // 核心优化：修复点击不同频道时，左侧侧边栏高亮错位的缺陷
        function updateChannelStyles(type, activeChannelId) {
            document.querySelectorAll('.channel-item').forEach(el => {
                if(el.dataset.channel === activeChannelId) {
                    el.className = "channel-item flex items-center px-2 py-1.5 rounded-xl text-jirai-pink bg-jirai-pink/10 border border-jirai-pink/10 cursor-pointer text-sm font-medium transition";
                } else {
                    el.className = "channel-item flex items-center px-2 py-1.5 rounded-xl text-gray-400 hover:bg-jirai-main/30 hover:text-gray-200 cursor-pointer text-sm transition";
                }
            });
        }

        function refreshOnlineMemberList() {
            const listContainer = document.getElementById('member-list'); if(!listContainer) return;
            listContainer.innerHTML = ""; let count = 0;
            appendMemberItem(myInfo.name, myInfo.avatar, myInfo.statusText, true); count++;
            for(let id in onlineUsers) { appendMemberItem(onlineUsers[id].name, onlineUsers[id].avatar, onlineUsers[id].status, false); count++; }
            document.getElementById('member-count').innerText = count;
        }

        function appendMemberItem(name, avatarSeed, status, isMe) {
            const listContainer = document.getElementById('member-list');
            const item = document.createElement('div'); item.className = "flex flex-col p-1.5 hover:bg-jirai-pink/5 rounded-xl cursor-pointer transition";
            item.innerHTML = `<div class="flex items-center space-x-2"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="w-6 h-6 rounded-full bg-jirai-blacker"><span class="text-xs text-neutral-300 font-medium truncate flex-1">${escapeHTML(name)} ${isMe ? '<span class="text-jirai-pink font-bold text-[9px]">[我]</span>':''}</span></div><div class="text-[9px] text-neutral-600 pl-8 truncate">${escapeHTML(status)}</div>`;
            listContainer.appendChild(item);
        }

        function renderMessage(msg) {
            const container = document.getElementById('chat-messages'); if(!container || document.getElementById(msg.msgId)) return;
            const isImage = msg.type === "IMAGE";
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const row = document.createElement('div'); row.id = msg.msgId;
            row.className = "flex items-start space-x-3 text-sm px-4 py-2 chat-row mx-[-16px] relative rounded-xl transition";
            let contentHTML = isImage ? `<img src="${msg.content}" class="mt-2 max-w-xs max-h-48 rounded-xl object-cover cursor-zoom-in" onclick="window.open('${msg.content}')">` : `<p class="text-neutral-300 select-text break-all">${escapeHTML(msg.content)}</p>`;
            row.innerHTML = `<img src="https://api.dicebear.com/7.x/bottts/svg?seed=${msg.senderAvatar}" class="w-9 h-9 rounded-full bg-jirai-darker flex-shrink-0 mt-0.5 border border-neutral-800"><div class="flex-1 min-w-0"><div class="flex items-baseline space-x-2"><span class="font-semibold text-white">${escapeHTML(msg.senderName)}</span><span class="text-[10px] text-neutral-500">${timeStr}</span></div>${contentHTML}</div>`;
            container.appendChild(row); container.scrollTop = container.scrollHeight;
        }

        // 小图图片发贴
        document.getElementById('btn-trigger-image').addEventListener('click', () => document.getElementById('image-loader').click());
        document.getElementById('image-loader').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file || file.size > 100 * 1024) return alert("为了网络流畅，请将图片压缩在100KB以内。");
            const reader = new FileReader();
            reader.onload = function(evt) {
                const msgId = "msg_"+Date.now();
                const payload = { type: "IMAGE", msgId, channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content: evt.target.result, timestamp: Date.now() };
                renderMessage(payload); 
                if(mqttClient && mqttClient.connected) mqttClient.publish(`jirai/room/${activeTextChannel}`, JSON.stringify(payload));
            };
            reader.readAsDataURL(file); this.value = "";
        });

        // --- 全局组件事件连通挂载 ---
        document.getElementById('btn-trigger-sidebar').addEventListener('click', (e) => { e.stopPropagation(); toggleSidebarDrawer(true); });
        document.getElementById('sidebar-overlay').addEventListener('click', () => toggleSidebarDrawer(false));
        
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            if (touchEndX - touchStartX > 60 && touchStartX < window.innerWidth / 3) toggleSidebarDrawer(true);
            if (touchStartX - touchEndX > 60) toggleSidebarDrawer(false);
        }, {passive: true});

        document.getElementById('btn-change-bg').addEventListener('click', () => {
            currentBgIdx = (currentBgIdx + 1) % backgrounds.length;
            document.getElementById('app-root').style.background = backgrounds[currentBgIdx].startsWith('linear') ? backgrounds[currentBgIdx] : '';
            document.getElementById('app-root').style.backgroundImage = backgrounds[currentBgIdx].startsWith('url') ? backgrounds[currentBgIdx] : '';
        });

        document.querySelectorAll('.channel-item').forEach(el => { el.addEventListener('click', (e) => { const d = e.currentTarget.dataset; if (d.type === 'text') switchTextChannel(d.channel); else if (d.type === 'voice') switchVoiceChannel(d.channel); }); });
        
        document.getElementById('user-profile-trigger').addEventListener('click', () => {
            const newStatus = prompt("输入今天的新契约个签:", myInfo.statusText);
            if(newStatus !== null) {
                myInfo.statusText = newStatus.trim() || "🎀 保持沉沦";
                document.getElementById('my-status-text').innerText = myInfo.statusText;
                refreshOnlineMemberList();
            }
        });

        document.getElementById('btn-disconnect-voice').addEventListener('click', () => leaveCurrentVoiceChannel());

        function simulateIncomingUser(id, name, avatar, status) {
            onlineUsers[id] = { name, avatar, status };
            refreshOnlineMemberList();
        }

        setInterval(() => { broadcastPresence(); }, 4000);
        
        // 核心加固：增加全自动容错安全过滤
        function escapeHTML(str) { 
            if(!str) return "";
            return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); 
        }
    </script>
</body>
</html>
