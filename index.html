<!DOCTYPE html>
<html lang="zh-CN">

    <!-- 引入即构科技 ZEGOCLOUD 官方最新通用 WebExpress 音视频 IM 双工 SDK -->
    <script src="https://download.zegocloud.com/jegosdk/ZegoExpressWebRTC-3.0.0.js"></script>
    <!-- 引入前端动态高安全对称加解密核心组件 CryptoJS 确保本地动态算流 Token -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* 深度灌注：地雷系暗黑病娇高级调色盘与 Discord 生态硬核锁死 */
        body { background-color: #0d0d12; -webkit-tap-highlight-color: transparent; color: #dbdee1; }
        .bg-jirai-blacker { background-color: #06060a; }
        .bg-jirai-dark { background-color: #0f0f15; }
        .bg-jirai-main { background-color: #14141f; }
        .bg-jirai-input { background-color: #1e1e2c; }
        
        .text-jirai-pink { color: #ff85a2; }
        .border-jirai-pink { border-color: #ff85a2; }
        .bg-jirai-pink { background-color: #ff85a2; }
        .shadow-jirai-glow { box-shadow: 0 0 20px rgba(255, 133, 162, 0.3); }
        
        /* 侧边栏滑出抽屉无缝过渡 */
        .sidebar-drawer { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Discord 经典阻尼呼吸圆角图标 */
        .server-icon { transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid #1e1e2c; }
        .server-icon:hover { border-radius: 14px !important; border-color: #ff85a2 !important; background-color: #ff85a2 !important; box-shadow: 0 0 15px #ff85a2; color: #000; }
        
        /* 消息整行高保真高亮变色 */
        .chat-row { transition: background-color 0.15s ease; position: relative; }
        .chat-row:hover { background-color: rgba(255, 133, 162, 0.04); }
        .chat-row .msg-actions { opacity: 0; transition: opacity 0.1s ease; }
        .chat-row:hover .msg-actions { opacity: 1; }
        
        /* Discord 高仿真提及高亮：琥珀金色底与黄色警示条 */
        .chat-row.mention-row { background-color: rgba(240, 178, 50, 0.08) !important; border-left: 3px solid #f0b232; }
        .chat-row.mention-row:hover { background-color: rgba(240, 178, 50, 0.12) !important; }
        .mention-badge { background-color: rgba(88, 101, 242, 0.3); color: #fff; padding: 0 4px; border-radius: 3px; font-weight: 500; }

        /* 通话高亮：说话时头像闪烁地雷粉红霓虹光环 */
        .is-speaking { border-color: #ff85a2 !important; box-shadow: 0 0 18px #ff85a2 !important; }
        
        /* 微型可爱蕾丝定制滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f0f15; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff85a2; border-radius: 10px; }

        /* 全场景视频/白板多维大画布放大挂载 */
        .video-card-expanded {
            grid-column: 1 / -1 !important;
            grid-row: span 2 !important;
            aspect-ratio: 16 / 9 !important;
            z-index: 30;
            border-color: #ff85a2 !important;
            box-shadow: 0 0 25px rgba(255, 133, 162, 0.4);
        }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot-blink { animation: blink 1.4s infinite both; }
        .dot-blink:nth-child(2) { animation-delay: 0.2s; }
        .dot-blink:nth-child(3) { animation-delay: 0.4s; }
        
        .video-view-container video { object-fit: cover !important; border-radius: 12px; width: 100%; height: 100%; }
        #whiteboard-canvas { cursor: crosshair; touch-action: none; background-color: #0b0b0f; }
    </style>
</head>

    <script>
        // --- 1. 挂载指定专属 ZEGO 凭证与常驻单房间机制 ---
        const ZEGO_APP_ID = 1408717387; 
        const ZEGO_SERVER_SECRET = "0552daaa40a25d28c8c5fe74dc4af61e";
        const ZEGO_SERVER_URL = "wss://webliveroom" + ZEGO_APP_ID + "-api.zegocloud.com/ws";
        const CONST_ROOM_ID = "global-server-room"; // 采用常驻房间调度，彻底杜绝切房鉴权错位黑屏 Bug

        let zgEngine = null;
        let isEngineReady = false;
        let localStreamInstance = null;
        
        let myInfo = { uid: "", name: "", avatar: "Ares", activeRoomId: "", statusText: "🎀 处于混沌极点" };
        let onlineRoomUsers = {}; 
        let activeTextChannel = "chat-lobby";
        let isMuted = false, isCameraOn = false, isScreenSharing = false, isBoardOpen = false;
        let currentCameraFacing = "user"; 
        let typingTimeout = null;

        const canvas = document.getElementById('whiteboard-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        const backgrounds = [
            "linear-gradient(135deg, #07070a 0%, #101018 100%)",
            "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"
        ];
        let currentBgIdx = 0;

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // 抽屉导航侧展控制
        const btnSidebar = document.getElementById('btn-trigger-sidebar');
        const sidebarWrapper = document.getElementById('sidebar-wrapper');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebarDrawer(show) {
            if (show) { sidebarWrapper.classList.add('drawer-open'); sidebarOverlay.classList.add('overlay-open'); }
            else { sidebarWrapper.classList.remove('drawer-open'); sidebarOverlay.classList.remove('overlay-open'); }
        }
        if(btnSidebar) btnSidebar.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebarDrawer(true); });
        if(sidebarOverlay) sidebarOverlay.addEventListener('click', () => toggleSidebarDrawer(false));

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            if (touchEndX - touchStartX > 70 && touchStartX < window.innerWidth / 3) toggleSidebarDrawer(true);
            if (touchStartX - touchEndX > 70) toggleSidebarDrawer(false);
        }, {passive: true});

        // 契约选择
        let selectedSeed = "Ares";
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(img => img.style.borderColor = 'transparent');
                e.target.style.borderColor = '#ff85a2';
                selectedSeed = e.target.dataset.avatar;
            });
        });
        if(document.querySelectorAll('.avatar-option')[0]) document.querySelectorAll('.avatar-option')[0].style.borderColor = '#ff85a2';

        document.getElementById('btn-enter').addEventListener('click', async () => {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return alert("名号不可为空白！🎀");

            myInfo.uid = "user_" + Math.floor(Math.random() * 899999 + 100000);
            myInfo.name = name;
            myInfo.avatar = selectedSeed;

            document.getElementById('my-name').innerText = name;
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${selectedSeed}`;
            document.getElementById('login-overlay').style.display = 'none';

            await initZegoEngine();
            
            if(isEngineReady) {
                const token = generateZegoRoomToken(CONST_ROOM_ID, myInfo.uid);
                await zgEngine.loginRoom(CONST_ROOM_ID, token, { userID: myInfo.uid, userName: myInfo.name }, { userUpdate: true });
                myInfo.activeRoomId = CONST_ROOM_ID;
            }

            await switchTextChannel("chat-lobby");
            
            if (isMobileDevice) {
                const textNode = document.getElementById('screen-btn-text');
                if(textNode) textNode.innerText = "🔄 翻转镜头";
            }
            initCanvasResize(); 
        });

        // CryptoJS 沙箱防卡死本地加密生成 Token 算法
        function generateZegoRoomToken(roomID, userID) {
            try {
                if (typeof CryptoJS === "undefined") return btoa(JSON.stringify({ appid: ZEGO_APP_ID, roomid: roomID, userid: userID }));
                const expiredTime = Math.floor(Date.now() / 1000) + 7200; 
                const nonce = Math.floor(Math.random() * 2147483647);
                const tokenObj = { appid: ZEGO_APP_ID, roomid: roomID, userid: userID, privilege: { 1: 1, 2: 1 }, nonce: nonce, expired: expiredTime };
                const tokenStr = JSON.stringify(tokenObj);
                const hash = CryptoJS.HmacSHA256(tokenStr, ZEGO_SERVER_SECRET);
                const signature = hash.toString(CryptoJS.enc.Hex);
                const finalPayload = { token: btoa(tokenStr), signature: signature };
                return btoa(JSON.stringify(finalPayload));
            } catch(e) { return btoa(JSON.stringify({ roomid: roomID, userid: userID })); }
        }

        async function initZegoEngine() {
            try {
                if (typeof ZegoExpressEngine === "undefined") return;
                zgEngine = new ZegoExpressEngine(ZEGO_APP_ID, ZEGO_SERVER_URL);
                isEngineReady = true;

                zgEngine.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                    if (updateType === 'ADD') {
                        for (let stream of streamList) {
                            try {
                                const remoteStream = await zgEngine.startPlayingStream(stream.streamID);
                                let userMeta = {};
                                try { if(stream.extraInfo) userMeta = JSON.parse(stream.extraInfo); } catch(ex){}
                                
                                onlineRoomUsers[stream.user.userID] = {
                                    name: userMeta.name || stream.user.userName,
                                    avatar: userMeta.avatar || "Ares",
                                    streamID: stream.streamID,
                                    isMuted: userMeta.isMuted || false
                                };
                                updateVoiceUIRender(); refreshOnlineMemberList();
                                
                                setTimeout(() => {
                                    const slot = document.getElementById(`video-slot-${stream.user.userID}`);
                                    if(slot && remoteStream) { slot.innerHTML = ""; zgEngine.createRemoteStreamView(remoteStream).play(slot); }
                                }, 500);
                            } catch(errStream){}
                        }
                    } else if (updateType === 'DELETE') {
                        for (let stream of streamList) {
                            zgEngine.stopPlayingStream(stream.streamID);
                            delete onlineRoomUsers[stream.user.userID];
                            updateVoiceUIRender(); refreshOnlineMemberList();
                        }
                    }
                });

                zgEngine.on('IMRecvBroadcastMessage', (roomID, chatData) => {
                    chatData.forEach(msg => {
                        try {
                            const data = JSON.parse(msg.message);
                            if(data.channelId === activeTextChannel && msg.fromUser.userID !== myInfo.uid) { renderMessage(data); }
                        } catch(e){}
                    });
                });

                zgEngine.on('IMRecvCustomCommand', (roomID, fromUser, command) => {
                    try {
                        const data = JSON.parse(command);
                        if(data.type === "TYPING" && data.channelId === activeTextChannel && fromUser.userID !== myInfo.uid) showTypingIndicator(data.senderName);
                        if(data.type === "REACTION" && data.channelId === activeTextChannel) executeLocalReactionAppend(data.targetMsgId, data.emoji);
                        if(data.type === "PIN_MSG" && data.channelId === activeTextChannel) { document.getElementById('pinned-text').innerText = data.content; document.getElementById('pinned-banner').classList.remove('hidden'); }
                        if(data.type === "DELETE_MSG" && data.channelId === activeTextChannel) { const el = document.getElementById(data.targetMsgId); if(el) el.remove(); }
                        if(data.type === "DRAW_PATH" && isBoardOpen) drawLocalLine(data.x1 * canvas.width, data.y1 * canvas.height, data.x2 * canvas.width, data.y2 * canvas.height, false);
                        if(data.type === "CLEAR_BOARD") ctx.clearRect(0, 0, canvas.width, canvas.height);
                    } catch(e){}
                });

                zgEngine.on('roomUserUpdate', () => { refreshOnlineMemberList(); });
            } catch (err) { console.error(err); }
        }

        // --- 2. 消息吞吐模块及回车物理挂起死锁防御 ---
        const chatInput = document.getElementById('chat-input');
        if(chatInput) {
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); e.stopPropagation();
                    executeSendAction();
                }
            });
        }

        async function executeSendAction() {
            const content = chatInput.value.trim();
            if(!content) return;

            const msgId = "msg_" + Date.now();
            const payload = { type: "TEXT", msgId, channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content, timestamp: Date.now() };

            renderMessage(payload); // 本地极速无缝回显
            chatInput.value = ""; chatInput.focus();

            if(isEngineReady) {
                try { await zgEngine.sendBroadcastMessage(CONST_ROOM_ID, JSON.stringify(payload)); } catch (e){}
            }
        }

        if(chatInput) {
            chatInput.addEventListener('input', () => {
                if(isEngineReady) {
                    zgEngine.sendCustomCommand(CONST_ROOM_ID, JSON.stringify({ type: "TYPING", senderName: myInfo.name, channelId: activeTextChannel })).catch(()=>{});
                }
            });
        }

        function renderMessage(msg) {
            const container = document.getElementById('chat-messages'); if(!container) return;
            const isImage = msg.type === "IMAGE";
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const row = document.createElement('div');
            row.id = msg.msgId || ("local_" + Date.now());
            
            // 🚨 Discord 经典功能高度还原：@everyone 琥珀高亮渲染
            const isMention = msg.content && msg.content.includes("@everyone");
            row.className = isMention ? "chat-row mention-row" : "chat-row";
            
            let escapedText = escapeHTML(msg.content);
            if (isMention) {
                escapedText = escapedText.replace(/@everyone/g, '<span class="mention-badge">@everyone</span>');
            }

            let contentHTML = isImage 
                ? `<img src="${msg.content}" class="msg-img" onclick="window.open('${msg.content}')">`
                : `<p class="msg-text-content">${escapedText}</p>`;

            row.innerHTML = `
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${msg.senderAvatar}" class="msg-avatar">
                <div class="msg-body">
                    <div class="msg-author-row"><span class="msg-author-name">${escapeHTML(msg.senderName)}</span><span class="msg-timestamp">${timeStr}</span></div>
                    ${contentHTML}
                    <div class="reaction-box"></div>
                </div>
                <div class="msg-actions">
                    <button class="action-icon-btn" onclick="sendReaction('${row.id}', '🖤')">🖤</button>
                    <button class="action-icon-btn" onclick="sendReaction('${row.id}', '🎀')">🎀</button>
                    <button class="action-icon-btn" onclick="pinThisMessage('${row.id}')">📌</button>
                    ${msg.senderUid === myInfo.uid ? `<button class="action-icon-btn" style="color: #da373c;" onclick="deleteMyMessage('${row.id}')">🗑️</button>` : ''}
                </div>
            `;
            container.appendChild(row); container.scrollTop = container.scrollHeight;
        }

        function sendReaction(msgId, emoji) {
            executeLocalReactionAppend(msgId, emoji);
            if(isEngineReady) {
                zgEngine.sendCustomCommand(CONST_ROOM_ID, JSON.stringify({ type: "REACTION", channelId: activeTextChannel, targetMsgId: msgId, emoji: emoji })).catch(()=>{});
            }
        }

        function executeLocalReactionAppend(msgId, emoji) {
            const row = document.getElementById(msgId); if(!row) return;
            const box = row.querySelector('.reaction-box'); if(!box) return;
            let existingPill = box.querySelector(`[data-emoji="${emoji}"]`);
            if(existingPill) {
                let countEl = existingPill.querySelector('.count'); countEl.innerText = parseInt(countEl.innerText) + 1;
            } else {
                const pill = document.createElement('div'); pill.dataset.emoji = emoji; pill.className = "reaction-pill";
                pill.innerHTML = `<span>${emoji}</span><span class="count">1</span>`;
                box.appendChild(pill);
            }
        }

        function pinThisMessage(msgId) {
            const row = document.getElementById(msgId); if(!row) return;
            const text = row.querySelector('.msg-text-content') ? row.querySelector('.msg-text-content').innerText : '[附件媒体数据]';
            document.getElementById('pinned-text').innerText = text; document.getElementById('pinned-banner').classList.remove('hidden');
            if(isEngineReady) {
                zgEngine.sendCustomCommand(CONST_ROOM_ID, JSON.stringify({ type: "PIN_MSG", channelId: activeTextChannel, content: text })).catch(()=>{});
            }
        }

        function deleteMyMessage(msgId) {
            const el = document.getElementById(msgId); if(el) el.remove();
            if(isEngineReady) {
                zgEngine.sendCustomCommand(CONST_ROOM_ID, JSON.stringify({ type: "DELETE_MSG", channelId: activeTextChannel, targetMsgId: msgId })).catch(()=>{});
            }
        }

        function showTypingIndicator(name) {
            const box = document.getElementById('typing-indicator'); document.getElementById('typing-text').innerText = name;
            box.style.display = 'flex'; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { box.style.display = 'none'; }, 2000);
        }

        // --- 3. 稳健的单房间多频道多轨标签切换调度中心 ---
        async function switchTextChannel(channelId) {
            toggleSidebarDrawer(false); 
            activeTextChannel = channelId;
            document.getElementById('chat-messages').innerHTML = ""; 
            document.getElementById('pinned-banner').classList.remove('hidden');
            document.getElementById('pinned-banner').classList.add('hidden');
            
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title-hashtag').innerText = "#";
            document.getElementById('room-title-text').innerText = itemEl ? itemEl.querySelector('span:not([style])').innerText : channelId;
            
            document.getElementById('panel-chat').style.display = 'flex'; 
            document.getElementById('panel-voice').style.display = 'none';
            refreshOnlineMemberList();
        }

        // 🚨 终极修复：完美激活电脑/iPad 语音信道
        async function switchVoiceChannel(channelId) {
            toggleSidebarDrawer(false); 
            
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title-hashtag').innerText = "🔊";
            document.getElementById('room-title-text').innerText = itemEl ? itemEl.querySelector('span').innerText : channelId;
            
            document.getElementById('panel-chat').style.display = 'none'; 
            document.getElementById('panel-voice').style.display = 'flex';
            document.getElementById('voice-status-pill').style.display = 'inline-block'; 
            document.getElementById('btn-disconnect-voice').style.display = 'inline-block';

            try {
                if(!localStreamInstance && isEngineReady) {
                    localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: false } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                }
                updateVoiceUIRender();
            } catch (err) { console.error("语音连线异常拦截防护:", err); }
        }

        async function leaveCurrentVoiceChannel() {
            if(isCameraOn) await toggleCameraStream();
            if(isScreenSharing) await toggleScreenStream();
            if(isBoardOpen) toggleWhiteboardLayer(); 
            
            if(localStreamInstance) { 
                try {
                    await zgEngine.stopPublishingStream("stream_" + myInfo.uid); 
                    zgEngine.destroyStream(localStreamInstance); 
                } catch(e){}
                localStreamInstance = null; 
            }
            
            isCameraOn = false; isScreenSharing = false;
            document.getElementById('voice-status-pill').style.display = 'none'; 
            document.getElementById('btn-disconnect-voice').style.display = 'none';
            
            updateVoiceUIRender(); 
            switchTextChannel("chat-lobby");
        }

        async function toggleCameraStream() {
            if(!isEngineReady) return;
            try {
                if(!isCameraOn) {
                    if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                    localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: true, facingMode: currentCameraFacing } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                    isCameraOn = true; document.getElementById('btn-toggle-video').style.backgroundColor = '#ff85a2'; document.getElementById('btn-toggle-video').style.color = '#000';
                    
                    updateVoiceUIRender();
                    setTimeout(() => {
                        const localBox = document.getElementById(`video-slot-local`);
                        if(localBox) { localBox.innerHTML = ""; zgEngine.createLocalStreamView(localStreamInstance).play(localBox); }
                    }, 300);
                } else {
                    if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                    localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: false } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                    isCameraOn = false; document.getElementById('btn-toggle-video').style.backgroundColor = '#383a40'; document.getElementById('btn-toggle-video').style.color = '#fff';
                    updateVoiceUIRender();
                }
            } catch(e){}
        }

        async function toggleScreenStream() {
            if(!isEngineReady) return;
            if (isMobileDevice) {
                if(!isCameraOn) return alert("请先开启视讯镜头再点击翻转哦🎀");
                currentCameraFacing = (currentCameraFacing === "user") ? "environment" : "user";
                isCameraOn = false; await toggleCameraStream(); return;
            }

            if(!isScreenSharing) {
                try {
                    if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                    localStreamInstance = await zgEngine.createStream({ screen: { audio: false, video: true } });
                    await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                    isScreenSharing = true; document.getElementById('btn-toggle-screen').style.backgroundColor = '#ff85a2'; document.getElementById('btn-toggle-screen').style.color = '#000';
                    updateVoiceUIRender();
                    setTimeout(() => {
                        const localBox = document.getElementById(`video-slot-local`);
                        if(localBox) { localBox.innerHTML = ""; zgEngine.createLocalStreamView(localStreamInstance).play(localBox); }
                    }, 300);
                } catch(e){}
            } else {
                isScreenSharing = false; document.getElementById('btn-toggle-screen').style.backgroundColor = '#383a40'; document.getElementById('btn-toggle-screen').style.color = '#fff';
                if(localStreamInstance) { zgEngine.stopPublishingStream("stream_" + myInfo.uid); zgEngine.destroyStream(localStreamInstance); }
                localStreamInstance = await zgEngine.createStream({ camera: { audio: true, video: false } });
                await zgEngine.startPublishingStream("stream_" + myInfo.uid, localStreamInstance, { extraInfo: JSON.stringify({ name: myInfo.name, avatar: myInfo.avatar, isMuted: isMuted }) });
                updateVoiceUIRender();
            }
        }

        function toggleWhiteboardLayer() {
            const area = document.getElementById('whiteboard-area'); isBoardOpen = !isBoardOpen;
            if(isBoardOpen) {
                area.style.display = 'flex'; document.getElementById('btn-toggle-board').style.backgroundColor = '#ff85a2'; document.getElementById('btn-toggle-board').style.color = '#000';
                canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight - 40; setupCanvasStyle();
            } else {
                area.style.display = 'none'; document.getElementById('btn-toggle-board').style.backgroundColor = '#383a40'; document.getElementById('btn-toggle-board').style.color = '#fff';
            }
        }
        document.getElementById('btn-toggle-board').addEventListener('click', toggleWhiteboardLayer);

        function setupCanvasStyle() { ctx.strokeStyle = '#ff85a2'; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = 3; }

        function drawLocalLine(x1, y1, x2, y2, emitBroadcast = true) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            if(emitBroadcast && isEngineReady) {
                zgEngine.sendCustomCommand(NATIVE_ROOM_ID, JSON.stringify({ type: "DRAW_PATH", channelId: activeTextChannel, x1: x1 / canvas.width, y1: y1 / canvas.height, x2: x2 / canvas.width, y2: y2 / canvas.height })).catch(()=>{});
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; [lastX, lastY] = [e.offsetX, e.offsetY]; });
        canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; drawLocalLine(lastX, lastY, e.offsetX, e.offsetY, true); [lastX, lastY] = [e.offsetX, e.offsetY]; });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true; const rect = canvas.getBoundingClientRect();
            lastX = e.touches[0].clientX - rect.left; lastY = e.touches[0].clientY - rect.top;
        }, { passive: true });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return; const rect = canvas.getBoundingClientRect();
            const currentX = e.touches[0].clientX - rect.left; const currentY = e.touches[0].clientY - rect.top;
            drawLocalLine(lastX, lastY, currentX, currentY, true); [lastX, lastY] = [currentX, currentY];
        }, { passive: true });

        document.getElementById('btn-clear-board').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(isEngineReady) zgEngine.sendCustomCommand(NATIVE_ROOM_ID, JSON.stringify({ type: "CLEAR_BOARD", channelId: activeTextChannel })).catch(()=>{});
        });

        function initCanvasResize() {
            window.addEventListener('resize', () => {
                if(isBoardOpen) {
                    const temp = ctx.getImageData(0,0,canvas.width,canvas.height);
                    canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight - 40;
                    setupCanvasStyle(); ctx.putImageData(temp,0,0);
                }
            });
        }

        async function refreshOnlineMemberList() {
            if(!isEngineReady) return;
            try {
                const result = await zgEngine.getRoomUserList(NATIVE_ROOM_ID);
                const listContainer = document.getElementById('member-list'); if(!listContainer) return;
                listContainer.innerHTML = ""; let count = 0;
                appendMemberItem(myInfo.name, myInfo.avatar, myInfo.statusText, true); count++;
                if(result && result.userList) {
                    result.userList.forEach(user => {
                        if(user.userID === myInfo.uid) return;
                        // 🚨 核心 Bug 修复：移除导致全局引用异常的 mediaState 与未定义未处理变量名，全面走信道高保真沙箱
                        const cached = onlineRoomUsers[user.userID];
                        appendMemberItem(cached ? cached.name : user.userName, cached ? cached.avatar : "Ares", cached ? cached.statusText : "🎀 已在大厅连线", false); count++;
                    });
                }
                document.getElementById('member-count').innerText = count;
            } catch(e){}
        }

        function appendMemberItem(name, avatarSeed, status, isMe) {
            const listContainer = document.getElementById('member-list');
            if(!listContainer) return;
            const item = document.createElement('div'); item.className = "member-card-node";
            item.innerHTML = `<div class="member-main-line"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="member-node-avatar"><span class="member-node-name">${escapeHTML(name)} ${isMe ? '<span style="color: #ff85a2; font-weight: bold;">[我]</span>':''}</span></div><div class="member-node-signature">${escapeHTML(status)}</div>`;
            listContainer.appendChild(item);
        }

        document.querySelectorAll('.channel-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const currentBtn = e.currentTarget; const type = currentBtn.dataset.type; const target = currentBtn.dataset.channel;
                document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                currentBtn.classList.add('active');
                if (type === 'text') switchTextChannel(target); else if (type === 'voice') switchVoiceChannel(target);
            });
        });

        function updateVoiceUIRender() {
            const container = document.getElementById('voice-grid'); if(!container) return;
            if(document.getElementById('panel-voice').style.display === 'none') return;
            container.innerHTML = "";

            appendVoiceCard(myInfo.uid, myInfo.name, myInfo.avatar, isMuted, true);
            if(localStreamInstance && (isCameraOn || isScreenSharing)) {
                setTimeout(() => {
                    const localBox = document.getElementById(`video-slot-local`);
                    if(localBox) { localBox.innerHTML = ""; zgEngine.createLocalStreamView(localStreamInstance).play(localBox); }
                }, 300);
            }
            for (let id in onlineRoomUsers) {
                const user = onlineRoomUsers[id]; appendVoiceCard(id, user.name, user.avatar, user.isMuted, false);
            }
        }

        function appendVoiceCard(uid, name, avatarSeed, mutedState, isMe) {
            const container = document.getElementById('voice-grid');
            const card = document.createElement('div'); card.id = `v-card-${uid}`; card.className = "voice-card";
            card.addEventListener('click', () => { card.classList.toggle('video-card-expanded'); });
            const videoSlotId = isMe ? "video-slot-local" : `video-slot-${uid}`;
            const muteBadgeHTML = mutedState ? `<div class="card-mute-badge">M</div>` : '';

            card.innerHTML = `
                <div id="${videoSlotId}" class="video-view-container"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="card-avatar-placeholder"></div>
                <div class="card-user-label">${escapeHTML(name)}</div>
                ${muteBadgeHTML}
            `;
            container.appendChild(card);
        }

        document.getElementById('btn-trigger-image').addEventListener('click', () => document.getElementById('image-loader').click());
        document.getElementById('image-loader').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file || file.size > 150 * 1024) return alert("请发送 150KB 内的小图资产。");
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const payload = { type: "IMAGE", msgId: "msg_"+Date.now(), channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content: evt.target.result, timestamp: Date.now() };
                renderMessage(payload);
                if(isEngineReady) await zgEngine.sendBroadcastMessage(NATIVE_ROOM_ID, JSON.stringify(payload));
            };
            reader.readAsDataURL(file); this.value = "";
        });

        document.getElementById('btn-disconnect-voice').addEventListener('click', () => leaveCurrentVoiceChannel());
        document.getElementById('btn-toggle-mic').addEventListener('click', async () => {
            isMuted = !isMuted; if(localStreamInstance) await zgEngine.mutePublishStreamAudio(localStreamInstance, isMuted);
            document.getElementById('btn-toggle-mic').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('btn-toggle-mic').style.color = isMuted ? "#ff85a2" : "#b5bac1";
            updateVoiceUIRender();
        });

        document.getElementById('btn-change-bg').addEventListener('click', () => {
            currentBgIdx = (currentBgIdx + 1) % backgrounds.length;
            const root = document.getElementById('app-root');
            root.style.backgroundImage = backgrounds[currentBgIdx].startsWith('url') ? backgrounds[currentBgIdx] : '';
            root.style.background = backgrounds[currentBgIdx].startsWith('linear') ? backgrounds[currentBgIdx] : '';
        });

        setInterval(() => { if(myInfo.name && isEngineReady) {
            zgEngine.sendCustomCommand(NATIVE_ROOM_ID, JSON.stringify({ type: "IDENTITY", name: myInfo.name, avatar: myInfo.avatar, rtcUid: myInfo.uid, voiceChannel: myInfo.activeRoomId, isMuted: isMuted, statusText: myInfo.statusText })).catch(()=>{});
        }}, 5000);
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
</html>
